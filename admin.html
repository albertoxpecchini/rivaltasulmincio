<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Pro Loco Rivalta sul Mincio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090f; --surface: rgba(255,255,255,.04); --surface2: rgba(255,255,255,.07);
      --border: rgba(255,255,255,.08); --border2: rgba(255,255,255,.14);
      --text: #e8eaf6; --muted: rgba(232,234,246,.45); --faint: rgba(232,234,246,.15);
      --accent: #1F6F8B; --accent2: #3a8c8a; --green: #2E7D32; --green2: #43A047;
      --red: rgba(239,83,80,.18); --red-text: #ef9a9a; --red-border: rgba(239,83,80,.25);
      --gold: #F9A825;
      --grad: linear-gradient(135deg,#1F6F8B,#3a8c8a);
      --grad-g: linear-gradient(135deg,#2E7D32,#43A047);
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: .92rem; overflow-x: hidden; }
    a { color: var(--accent2); text-decoration: none; }

    /* ── Aurora ──────────────────────────────────────────────────── */
    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); }
    .orb-1 { width: 700px; height: 700px; background: radial-gradient(circle,#1F6F8B 0%,transparent 60%); top: -200px; left: -150px; opacity: .1; animation: oa 22s ease-in-out infinite alternate; }
    .orb-2 { width: 450px; height: 450px; background: radial-gradient(circle,#2E7D32 0%,transparent 60%); bottom: -100px; right: 0; opacity: .07; animation: ob 18s ease-in-out infinite alternate; }
    .orb-3 { width: 320px; height: 320px; background: radial-gradient(circle,#3a8c8a 0%,transparent 60%); top: 40%; left: 55%; opacity: .06; animation: oc 14s ease-in-out infinite alternate; }
    @keyframes oa { to { transform: translate(80px, 60px) scale(1.1); } }
    @keyframes ob { to { transform: translate(-50px, -40px) scale(1.2); } }
    @keyframes oc { to { transform: translate(-40%, -60%) scale(1.1); } }
    .grid-overlay { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px); background-size: 44px 44px; }

    /* ── Login screen ─────────────────────────────────────────────── */
    #login-screen { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card {
      width: 100%; max-width: 400px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(28px) scale(.97); } to { opacity: 1; transform: none; } }
    .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .login-brand-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--grad); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: 0 6px 20px rgba(31,111,139,.35); }
    .login-brand-name { font-family: 'Fraunces', Georgia, serif; font-size: .88rem; font-weight: 600; background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
    .login-card h1 { font-family: 'Fraunces', Georgia, serif; font-size: 1.7rem; font-weight: 700; margin-bottom: 6px; }
    .login-card > p { color: var(--muted); font-size: .88rem; margin-bottom: 28px; }

    /* ── App shell ────────────────────────────────────────────────── */
    #app-screen { display: none; position: relative; z-index: 1; min-height: 100vh; }
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(7,9,15,.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-icon { width: 32px; height: 32px; border-radius: 9px; background: var(--grad); display: flex; align-items: center; justify-content: center; font-size: .9rem; }
    .topbar-brand { font-family: 'Fraunces', Georgia, serif; font-size: .95rem; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .user-email { font-size: .78rem; color: var(--muted); }
    .btn-topbar { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 5px 14px; border-radius: 8px; font-size: .78rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .2s; }
    .btn-topbar:hover { background: var(--surface2); border-color: var(--border2); }

    .app-body { max-width: 980px; margin: 0 auto; padding: 36px 24px 80px; }
    .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .app-header h2 { font-family: 'Fraunces', Georgia, serif; font-size: 1.5rem; font-weight: 700; }

    /* ── Tab bar ──────────────────────────────────────────────────── */
    .tab-bar { display: flex; gap: 3px; margin-bottom: 30px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; width: fit-content; }
    .tab-bar button {
      padding: 8px 22px; border-radius: 9px; border: none; font-size: .84rem; font-weight: 600;
      cursor: pointer; font-family: inherit; background: transparent; color: var(--muted); transition: all .2s;
    }
    .tab-bar button.on { background: rgba(31,111,139,.18); color: var(--text); border: 1px solid rgba(31,111,139,.25); }
    .admin-panel { display: none; }
    .admin-panel.on { display: block; }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; border-radius: 10px; border: none;
      font-size: .86rem; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all .2s; white-space: nowrap;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }
    .btn-primary {
      background: linear-gradient(135deg,#1F6F8B 0%,#3a8c8a 50%,#2E7D32 100%);
      background-size: 200% 200%; animation: grad 4s ease infinite;
      color: #fff; box-shadow: 0 4px 16px rgba(31,111,139,.3);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 7px 22px rgba(31,111,139,.45); }
    @keyframes grad { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    .btn-success {
      background: linear-gradient(135deg,#2E7D32 0%,#3a8c8a 50%,#1F6F8B 100%);
      background-size: 200% 200%; animation: grad 4s ease infinite;
      color: #fff; box-shadow: 0 4px 16px rgba(46,125,50,.25);
    }
    .btn-success:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 7px 22px rgba(46,125,50,.4); }
    .btn-danger { background: var(--red); color: var(--red-text); border: 1px solid var(--red-border); }
    .btn-danger:hover:not(:disabled) { background: rgba(239,83,80,.28); }
    .btn-ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); background: var(--surface2); border-color: var(--border2); }
    .btn-sm { padding: 6px 12px; font-size: .79rem; border-radius: 8px; }
    .btn-full { width: 100%; justify-content: center; }

    /* ── Form fields ──────────────────────────────────────────────── */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 7px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 13px 15px;
      background: rgba(255,255,255,.04); border: 1.5px solid var(--border);
      border-radius: 11px; color: var(--text); font-size: .9rem; font-family: inherit;
      outline: none; transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .field input::placeholder, .field textarea::placeholder { color: var(--faint); }
    .field select option { background: #0d1a24; }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: rgba(31,111,139,.6); box-shadow: 0 0 0 3px rgba(31,111,139,.12);
      background: rgba(255,255,255,.07);
    }
    .field textarea { min-height: 320px; resize: vertical; line-height: 1.6; font-size: .88rem; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── Tables ───────────────────────────────────────────────────── */
    .data-table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .data-table th {
      text-align: left; padding: 11px 16px;
      font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.02);
    }
    .data-table td { padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,.025); }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Status pills ─────────────────────────────────────────────── */
    .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700; }
    .pill-pub  { background: rgba(46,125,50,.15); color: #a5d6a7; border: 1px solid rgba(46,125,50,.3); }
    .pill-draft { background: rgba(249,168,37,.1); color: #ffd54f; border: 1px solid rgba(249,168,37,.2); }
    .role-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700; }
    .role-admin { background: rgba(249,168,37,.12); color: var(--gold); border: 1px solid rgba(249,168,37,.2); }
    .role-user  { background: rgba(31,111,139,.12); color: #80cbc4; border: 1px solid rgba(31,111,139,.2); }

    .user-av { width: 34px; height: 34px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .post-title-cell { font-weight: 600; max-width: 280px; }
    .post-title-cell a { color: var(--text); transition: color .2s; }
    .post-title-cell a:hover { color: var(--accent2); }

    /* ── Notifications ────────────────────────────────────────────── */
    .msg { padding: 11px 14px; border-radius: 10px; font-size: .84rem; margin-bottom: 14px; }
    .msg-error { background: rgba(239,83,80,.12); color: var(--red-text); border: 1px solid var(--red-border); }
    .msg-ok    { background: rgba(46,125,50,.12); color: #a5d6a7; border: 1px solid rgba(46,125,50,.25); }
    #toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 999;
      padding: 12px 20px; border-radius: 12px; font-size: .86rem; font-weight: 600;
      backdrop-filter: blur(20px); border: 1px solid var(--border);
      transform: translateY(16px); opacity: 0; transition: all .3s; pointer-events: none;
    }
    #toast.show { transform: none; opacity: 1; }
    #toast.ok  { background: rgba(46,125,50,.3); color: #a5d6a7; }
    #toast.err { background: rgba(239,83,80,.25); color: var(--red-text); }

    /* ── Drawer ───────────────────────────────────────────────────── */
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 100; }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: -700px; width: min(680px, 100vw);
      height: 100vh; background: #0a1520; z-index: 101;
      overflow-y: auto; transition: right .3s cubic-bezier(.22,1,.36,1);
      display: flex; flex-direction: column;
      border-left: 1px solid var(--border);
    }
    .drawer.open { right: 0; }
    .drawer-head {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: #0a1520; z-index: 1;
    }
    .drawer-head h3 { font-family: 'Fraunces', Georgia, serif; font-size: 1.1rem; }
    .drawer-close { background: var(--surface); border: 1px solid var(--border); width: 32px; height: 32px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .drawer-close:hover { background: var(--surface2); color: var(--text); }
    .drawer-body { padding: 24px; flex: 1; }
    .drawer-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
      position: sticky; bottom: 0; background: #0a1520;
    }

    /* ── Image type selector ──────────────────────────────────────── */
    .img-type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 6px; }
    .img-type-opt { position: relative; }
    .img-type-opt input { position: absolute; opacity: 0; width: 0; height: 0; }
    .img-type-opt label {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 4px; border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; font-size: .72rem; text-align: center; color: var(--muted);
      transition: all .15s;
    }
    .img-type-opt label span { font-size: 1.4rem; }
    .img-type-opt label:hover { border-color: rgba(31,111,139,.5); color: var(--text); background: rgba(31,111,139,.07); }
    .img-type-opt input:checked + label { border-color: var(--accent2); background: rgba(58,140,138,.12); color: var(--text); }

    .badge-color-row { display: flex; gap: 14px; margin-top: 6px; flex-wrap: wrap; }
    .badge-color-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--muted); font-size: .85rem; transition: color .15s; }
    .badge-color-row label:hover { color: var(--text); }
    .md-hint { font-size: .73rem; color: var(--muted); margin-top: 5px; }

    /* ── Empty state ──────────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state > span { font-size: 2.5rem; display: block; margin-bottom: 14px; }
    .empty-state p { font-size: .88rem; }

    /* ── Spinner ──────────────────────────────────────────────────── */
    .sp { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.25); border-top-color: #fff; border-radius: 50%; animation: spin .55s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .field-row { grid-template-columns: 1fr; }
      .img-type-grid { grid-template-columns: repeat(3, 1fr); }
      .app-body { padding: 24px 16px 60px; }
      .data-table thead { display: none; }
      .data-table td { display: block; }
      .data-table tr { border-bottom: 1px solid var(--border); display: block; padding: 8px 0; }
    }
  </style>
</head>
<body>

<div class="aurora">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-overlay"></div>
</div>

<!-- ══ LOGIN ══════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">⚙️</div>
      <span class="login-brand-name">Pro Loco Admin</span>
    </div>
    <h1>Pannello Admin</h1>
    <p>Accedi per gestire post e utenti del sito.</p>
    <div id="login-msg"></div>
    <form id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" required placeholder="admin@esempio.it" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="margin-top:4px">
        <span class="btn-text">Accedi</span>
        <span class="sp" style="display:none" id="login-sp"></span>
      </button>
    </form>
    <p style="margin-top:20px;font-size:.8rem;color:var(--muted);text-align:center">
      <a href="index.html" style="color:var(--muted)">← Torna al sito</a>
    </p>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════════════════ -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">⚙️</div>
      <span class="topbar-brand">Pro Loco Rivalta – Admin</span>
    </div>
    <div class="topbar-right">
      <div id="topbar-profile"></div>
      <a href="me.html" class="btn-topbar">👤 Il mio profilo</a>
      <button class="btn-topbar" id="logout-btn">Esci</button>
      <a href="index.html" class="btn-topbar">← Sito</a>
    </div>
  </div>

  <div class="app-body">
    <div class="app-header">
      <h2>Dashboard</h2>
    </div>
    <div class="tab-bar">
      <button class="on" id="atab-posts" onclick="atab('posts')">📝 Post</button>
      <button id="atab-users" onclick="atab('users')">👥 Utenti</button>
    </div>
    <div id="app-msg"></div>

    <!-- Posts panel -->
    <div class="admin-panel on" id="ap-posts">
      <div style="display:flex;justify-content:flex-end;margin-bottom:18px">
        <button class="btn btn-success" id="new-post-btn">+ Nuovo articolo</button>
      </div>
      <div id="posts-wrap"><div class="empty-state"><span>⏳</span><p>Caricamento…</p></div></div>
    </div>

    <!-- Users panel -->
    <div class="admin-panel" id="ap-users">
      <div id="users-wrap"><div class="empty-state"><span>⏳</span><p>Caricamento…</p></div></div>
    </div>
  </div>
</div>

<!-- ══ DRAWER ════════════════════════════════════════════════════════ -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3 id="drawer-title">Nuovo articolo</h3>
    <button class="drawer-close" id="drawer-close" aria-label="Chiudi">×</button>
  </div>
  <div class="drawer-body">
    <div id="drawer-msg"></div>
    <form id="post-form">
      <input type="hidden" id="f-id" />
      <div class="field">
        <label>Titolo *</label>
        <input type="text" id="f-title" required placeholder="Es. Sagra del Luccio 2026: programma completo" />
      </div>
      <div class="field">
        <label>Sommario <small style="font-weight:400;color:var(--muted)">(mostrato in anteprima)</small></label>
        <input type="text" id="f-excerpt" placeholder="Breve descrizione dell'articolo…" />
      </div>
      <div class="field">
        <label>Contenuto <small style="font-weight:400;color:var(--muted)">(Markdown)</small></label>
        <textarea id="f-content" placeholder="Scrivi il testo dell'articolo…&#10;&#10;## Titolo sezione&#10;&#10;Paragrafo…"></textarea>
        <div class="md-hint">Supporta: **grassetto**, *corsivo*, ## Titolo, ### Sottotitolo</div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Categoria</label>
          <select id="f-category">
            <option>Territorio</option>
            <option>Il Luccio</option>
            <option>Fauna</option>
            <option>Ambiente</option>
            <option>Ecoturismo</option>
            <option>Storia</option>
            <option>Eventi</option>
          </select>
        </div>
        <div class="field">
          <label>Badge etichetta</label>
          <input type="text" id="f-badge" placeholder="Es. Natura" />
        </div>
      </div>
      <div class="field">
        <label>Colore badge</label>
        <div class="badge-color-row">
          <label><input type="radio" name="badge_color" value="default" checked /> Blu</label>
          <label><input type="radio" name="badge_color" value="green" /> Verde</label>
        </div>
      </div>
      <div class="field">
        <label>Illustrazione</label>
        <div class="img-type-grid">
          <div class="img-type-opt"><input type="radio" name="image_type" id="it-festival" value="festival" checked /><label for="it-festival"><span>🎪</span>Sagra</label></div>
          <div class="img-type-opt"><input type="radio" name="image_type" id="it-heron" value="heron" /><label for="it-heron"><span>🦢</span>Aironi</label></div>
          <div class="img-type-opt"><input type="radio" name="image_type" id="it-cycling" value="cycling" /><label for="it-cycling"><span>🚴</span>Ciclabile</label></div>
          <div class="img-type-opt"><input type="radio" name="image_type" id="it-village" value="village" /><label for="it-village"><span>🌙</span>Borgo</label></div>
          <div class="img-type-opt"><input type="radio" name="image_type" id="it-reeds" value="reeds" /><label for="it-reeds"><span>🌾</span>Canneti</label></div>
          <div class="img-type-opt"><input type="radio" name="image_type" id="it-fishing" value="fishing" /><label for="it-fishing"><span>🎣</span>Pesca</label></div>
          <div class="img-type-opt"><input type="radio" name="image_type" id="it-nature" value="nature" /><label for="it-nature"><span>🌸</span>Natura</label></div>
        </div>
      </div>
    </form>
  </div>
  <div class="drawer-footer">
    <button class="btn btn-ghost" id="save-draft-btn" type="button">Salva bozza</button>
    <button class="btn btn-success" id="publish-btn" type="button">Pubblica</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const fmt = iso => new Date(iso).toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
let currentAdminUserId = null;
let currentAdminUsername = null;

/* ── Toast ──────────────────────────────────────────────────────────── */
let _tt;
function toast(txt, type = 'ok') {
  const el = $('toast'); el.textContent = txt; el.className = 'show ' + type;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3200);
}

function showMsg(elId, text, type = 'error') {
  const el = $(elId);
  el.innerHTML = `<div class="msg msg-${type === 'ok' ? 'ok' : 'error'}">${text}</div>`;
  if (type === 'ok') setTimeout(() => el.innerHTML = '', 3000);
}

/* ── Auth ─────────────────────────────────────────────────────────── */
$('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = $('login-btn');
  btn.disabled = true;
  btn.querySelector('.btn-text').style.display = 'none';
  $('login-sp').style.display = 'inline-block';

  const { error } = await sb.auth.signInWithPassword({
    email: $('email').value.trim(),
    password: $('password').value,
  });

  btn.disabled = false;
  btn.querySelector('.btn-text').style.display = '';
  $('login-sp').style.display = 'none';

  if (error) showMsg('login-msg', 'Credenziali non valide. Verifica email e password.');
});

$('logout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.href = 'index.html';
});

sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    $('login-screen').style.display = 'none';
    $('app-screen').style.display = 'block';
    currentAdminUserId = session.user.id;

    // Load profile for topbar avatar
    const { data: prof } = await sb.from('profiles')
      .select('username, display_name, avatar_emoji, avatar_color')
      .eq('id', session.user.id).single();
    currentAdminUsername = prof?.username || null;

    const tp = $('topbar-profile');
    if (prof && tp) {
      tp.innerHTML = `<a href="me.html" style="display:flex;align-items:center;gap:7px;padding:4px 12px 4px 6px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:20px;font-size:.78rem;font-weight:600;color:var(--text);text-decoration:none">
        <span style="width:24px;height:24px;border-radius:7px;background:${prof.avatar_color||'#1F6F8B'};display:inline-flex;align-items:center;justify-content:center;font-size:.9rem">${prof.avatar_emoji||'🌿'}</span>
        @${prof.username}</a>`;
    } else if (tp) {
      tp.innerHTML = `<span style="font-size:.78rem;color:var(--muted)">${session.user.email}</span>`;
    }

    await loadPosts();
  } else {
    $('login-screen').style.display = 'flex';
    $('app-screen').style.display = 'none';
  }
});

/* ── Posts list ───────────────────────────────────────────────────── */
let posts = [];

async function loadPosts() {
  const { data, error } = await sb
    .from('posts')
    .select('id, title, category, published, published_at, created_at, author_username')
    .order('created_at', { ascending: false });

  if (error) { showMsg('app-msg', 'Errore nel caricamento dei post: ' + error.message); return; }
  posts = data || [];
  renderTable();
}

function renderTable() {
  const wrap = $('posts-wrap');
  if (!posts.length) {
    wrap.innerHTML = '<div class="empty-state"><span>📝</span><p>Nessun articolo ancora. Creane uno!</p></div>';
    return;
  }

  wrap.innerHTML = `
    <table class="data-table">
      <thead><tr>
        <th>Titolo</th><th>Autore</th><th>Categoria</th><th>Stato</th><th>Data</th><th></th>
      </tr></thead>
      <tbody>
        ${posts.map(p => `
          <tr data-id="${p.id}">
            <td class="post-title-cell">
              ${p.published ? `<a href="post.html?id=${p.id}" target="_blank">${p.title}</a>` : p.title}
            </td>
            <td style="color:var(--muted);font-size:.82rem">${p.author_username ? '@' + p.author_username : '—'}</td>
            <td style="color:var(--muted)">${p.category || '—'}</td>
            <td><span class="pill ${p.published ? 'pill-pub' : 'pill-draft'}">${p.published ? 'Pubblicato' : 'Bozza'}</span></td>
            <td style="color:var(--muted);font-size:.82rem">${fmt(p.published_at || p.created_at)}</td>
            <td>
              <div class="actions">
                <button class="btn btn-ghost btn-sm" onclick="editPost('${p.id}')">✏️ Modifica</button>
                ${p.published
                  ? `<button class="btn btn-ghost btn-sm" onclick="togglePublish('${p.id}', false)">Nascondi</button>`
                  : `<button class="btn btn-success btn-sm" onclick="togglePublish('${p.id}', true)">Pubblica</button>`}
                <button class="btn btn-danger btn-sm" onclick="deletePost('${p.id}')">🗑</button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

/* ── Toggle publish ───────────────────────────────────────────────── */
async function togglePublish(id, publish) {
  const { error } = await sb.from('posts').update({
    published: publish,
    published_at: publish ? new Date().toISOString() : null,
  }).eq('id', id);
  if (error) { toast(error.message, 'err'); return; }
  toast(publish ? '✅ Pubblicato' : 'Nascosto');
  await loadPosts();
}

/* ── Delete ───────────────────────────────────────────────────────── */
async function deletePost(id) {
  const post = posts.find(p => p.id === id);
  if (!confirm(`Eliminare definitivamente "${post?.title}"?`)) return;
  const { error } = await sb.from('posts').delete().eq('id', id);
  if (error) { toast(error.message, 'err'); return; }
  toast('Articolo eliminato');
  await loadPosts();
}

/* ── Drawer ───────────────────────────────────────────────────────── */
function openDrawer(title = 'Nuovo articolo') {
  $('drawer-title').textContent = title;
  $('drawer-msg').innerHTML = '';
  $('drawer-overlay').classList.add('open');
  $('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  $('drawer-overlay').classList.remove('open');
  $('drawer').classList.remove('open');
  document.body.style.overflow = '';
  $('post-form').reset();
  $('f-id').value = '';
}

$('drawer-overlay').addEventListener('click', closeDrawer);
$('drawer-close').addEventListener('click', closeDrawer);
$('new-post-btn').addEventListener('click', () => { closeDrawer(); openDrawer('Nuovo articolo'); });

/* ── Edit ─────────────────────────────────────────────────────────── */
async function editPost(id) {
  const { data: p, error } = await sb.from('posts').select('*').eq('id', id).single();
  if (error || !p) { toast('Errore nel caricamento.', 'err'); return; }
  $('f-id').value = p.id;
  $('f-title').value = p.title || '';
  $('f-excerpt').value = p.excerpt || '';
  $('f-content').value = p.content || '';
  $('f-category').value = p.category || 'Territorio';
  $('f-badge').value = p.badge || '';
  const bcr = document.querySelector(`input[name="badge_color"][value="${p.badge_color || 'default'}"]`);
  if (bcr) bcr.checked = true;
  const it = document.querySelector(`input[name="image_type"][value="${p.image_type || 'nature'}"]`);
  if (it) it.checked = true;
  openDrawer('Modifica articolo');
}

/* ── Save ─────────────────────────────────────────────────────────── */
async function savePost(publish) {
  const saveDraftBtn = $('save-draft-btn');
  const publishBtn = $('publish-btn');
  saveDraftBtn.disabled = true;
  publishBtn.disabled = true;

  try {
  const id = $('f-id').value;
  const title = $('f-title').value.trim();
  if (!title) { showMsg('drawer-msg', 'Il titolo è obbligatorio.'); return; }

  const payload = {
    title,
    excerpt:     $('f-excerpt').value.trim() || null,
    content:     $('f-content').value.trim() || null,
    category:    $('f-category').value,
    badge:       $('f-badge').value.trim() || null,
    badge_color: document.querySelector('input[name="badge_color"]:checked').value,
    image_type:  document.querySelector('input[name="image_type"]:checked').value,
    published:   publish,
    published_at: publish ? new Date().toISOString() : null,
  };

  let error;
  if (id) {
    ({ error } = await sb.from('posts').update(payload).eq('id', id));
  } else {
    const { data: authData, error: authErr } = await sb.auth.getUser();
    if (authErr || !authData?.user) {
      showMsg('drawer-msg', 'Sessione scaduta. Accedi di nuovo per pubblicare.');
      return;
    }

    if (!currentAdminUserId) currentAdminUserId = authData.user.id;
    if (!currentAdminUsername) {
      const { data: prof } = await sb.from('profiles')
        .select('username')
        .eq('id', currentAdminUserId)
        .single();
      currentAdminUsername = prof?.username || null;
    }

    const insertPayload = {
      ...payload,
      user_id: currentAdminUserId,
      author_username: currentAdminUsername,
    };

    ({ error } = await sb.from('posts').insert(insertPayload));
  }

  if (error) { showMsg('drawer-msg', 'Errore: ' + error.message); return; }
  closeDrawer();
  toast(publish ? '✅ Articolo pubblicato' : '💾 Bozza salvata');
  await loadPosts();
  } catch (err) {
    showMsg('drawer-msg', 'Errore imprevisto: ' + (err?.message || 'Operazione non riuscita'));
  } finally {
    saveDraftBtn.disabled = false;
    publishBtn.disabled = false;
  }
}

$('save-draft-btn').addEventListener('click', () => savePost(false));
$('publish-btn').addEventListener('click', () => savePost(true));

window.editPost = editPost;
window.togglePublish = togglePublish;
window.deletePost = deletePost;

/* ── Tabs ─────────────────────────────────────────────────────────── */
function atab(name) {
  ['posts', 'users'].forEach(n => {
    document.getElementById('ap-' + n)?.classList.toggle('on', n === name);
    document.getElementById('atab-' + n)?.classList.toggle('on', n === name);
  });
  if (name === 'users') loadUsers();
}

/* ── Users management ─────────────────────────────────────────────── */
async function loadUsers() {
  const wrap = $('users-wrap');
  const { data: users, error } = await sb.from('profiles')
    .select('id,username,display_name,avatar_emoji,avatar_color,role,created_at')
    .order('created_at', { ascending: false });

  if (error) { wrap.innerHTML = `<div class="empty-state"><span>⚠️</span><p>${error.message}</p></div>`; return; }
  if (!users || !users.length) { wrap.innerHTML = '<div class="empty-state"><span>👥</span><p>Nessun utente registrato.</p></div>'; return; }

  wrap.innerHTML = `
    <table class="data-table">
      <thead><tr>
        <th>Utente</th><th>Username</th><th>Ruolo</th><th>Iscritto il</th><th></th>
      </tr></thead>
      <tbody>
        ${users.map(u => `
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <span class="user-av" style="background:${u.avatar_color || '#1F6F8B'}">${u.avatar_emoji || '🌿'}</span>
                <span style="font-weight:600">${u.display_name || u.username}</span>
              </div>
            </td>
            <td><a href="profile.html?u=${u.username}" target="_blank">@${u.username}</a></td>
            <td><span class="role-badge role-${u.role || 'user'}">${u.role || 'user'}</span></td>
            <td style="color:var(--muted);font-size:.82rem">${new Date(u.created_at).toLocaleDateString('it-IT')}</td>
            <td>
              <div class="actions">
                ${u.role !== 'admin'
                  ? `<button class="btn btn-ghost btn-sm" onclick="setRole('${u.id}','admin')">⬆ Admin</button>`
                  : `<button class="btn btn-danger btn-sm" onclick="setRole('${u.id}','user')">↓ Rimuovi admin</button>`}
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

async function setRole(uid, role) {
  const { error } = await sb.from('profiles').update({ role }).eq('id', uid);
  if (error) { toast(error.message, 'err'); return; }
  toast(role === 'admin' ? '⭐ Promosso admin' : 'Ruolo rimosso');
  loadUsers();
}
window.setRole = setRole;
</script>
</body>
</html>
