name: Update Site Stats

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update Supabase site stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL || 'https://tljwxymcavgpzntksjtx.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY || vars.SUPABASE_SERVICE_ROLE_KEY || vars.SUPABASE_SERVICE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsand4eW1jYXZncHpudGtzanR4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzI4MzYzOSwiZXhwIjoyMDkyODU5NjM5fQ.ybJDIuD0ADk4lEVztfpjTs4HBSGvBFubIyiQxRgOft0' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::Missing SUPABASE_URL (repo secret or repo variable)."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Missing SUPABASE_SERVICE_ROLE_KEY (or SUPABASE_SERVICE_KEY)."
            exit 1
          fi
          node scripts/update-site-stats.mjs
