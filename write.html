<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrivi – Rivalta sul Mincio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent:   #1F6F8B;
      --accent-2: #3a8c8a;
      --green:    #2E7D32;
      --text:     #1d1d1f;
      --muted:    #86868b;
      --border:   #d2d2d7;
      --surface:  #ffffff;
      --bg:       #f5f5f7;
      --err:      #b94747;
      --ok:       #2f7a44;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-conic-gradient(rgba(0,0,0,.015) 0% 25%, transparent 0% 50%) 0 0 / 4px 4px;
      pointer-events: none; z-index: 0;
    }

    a { color: var(--accent); text-decoration: none; }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: 52px;
      background: rgba(255,255,255,.94); backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(0,0,0,.06);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }

    .top-brand {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Sora', sans-serif; font-size: .88rem; font-weight: 700;
      color: var(--text); text-decoration: none; letter-spacing: -.01em;
    }

    .top-logo {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .78rem; color: #fff; font-weight: 700;
    }

    .top-actions { display: flex; align-items: center; gap: 8px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      border-radius: 9px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 600;
      padding: 8px 14px; cursor: pointer; text-decoration: none; transition: all .15s;
    }
    .btn:hover { border-color: #aaa; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary {
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff; box-shadow: 0 4px 16px rgba(31,111,139,.28);
    }
    .btn-primary:hover { box-shadow: 0 6px 22px rgba(31,111,139,.4); border-color: transparent; }
    .btn-ghost { color: var(--muted); }
    .btn-danger { color: var(--err); border-color: rgba(185,71,71,.22); }
    .btn-danger:hover { background: rgba(185,71,71,.05); }

    /* ── Page ── */
    .page {
      position: relative; z-index: 1;
      max-width: 920px; margin: 0 auto;
      padding: 24px 16px 80px;
      display: grid; gap: 14px;
    }

    .page-eyebrow {
      font-size: 10px; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px;
    }

    .page-title {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700; letter-spacing: -.03em; line-height: 1.1;
    }

    .page-sub { font-size: .84rem; color: var(--muted); margin-top: 4px; }

    /* ── Bento grid ── */
    .bento {
      display: grid;
      gap: 6px;
      grid-template-columns: 1fr 296px;
      grid-template-areas:
        "editor  meta"
        "editor  img"
        "editor  status"
        "actions actions";
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 1px 8px rgba(0,0,0,.05);
      padding: 20px 22px;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }

    .card-editor {
      grid-area: editor;
      gap: 16px;
    }

    .card-editor::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--green), var(--accent-2), var(--accent));
      border-radius: 14px 14px 0 0;
    }

    .card-meta   { grid-area: meta;   gap: 14px; }
    .card-img    { grid-area: img;    gap: 10px; }
    .card-status { grid-area: status; display: none; gap: 10px; }
    .card-status.visible { display: flex; }

    .card-actions {
      grid-area: actions;
      background: var(--text);
      box-shadow: 0 6px 20px rgba(13,40,48,.14);
      flex-direction: row; align-items: center;
      justify-content: space-between; gap: 12px; flex-wrap: wrap;
      padding: 16px 22px;
    }

    .actions-label {
      font-family: 'Sora', sans-serif; font-size: .88rem; font-weight: 700;
      color: #fff; letter-spacing: -.01em;
    }
    .actions-sub { font-size: .76rem; color: rgba(255,255,255,.5); margin-top: 2px; }
    .actions-btns { display: flex; gap: 8px; flex-wrap: wrap; }

    .card-label {
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px;
    }

    /* ── Fields ── */
    .field { display: grid; gap: 5px; }
    .field label {
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
    }
    .field input, .field textarea, .field select {
      width: 100%; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      padding: 10px 12px; transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: #8da9b8;
      box-shadow: 0 0 0 3px rgba(31,111,139,.1);
    }
    .field textarea { min-height: 220px; resize: vertical; line-height: 1.65; flex: 1; }
    .field select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #587282 50%),
        linear-gradient(135deg, #587282 50%, transparent 50%);
      background-position:
        calc(100% - 16px) calc(50% - 2px),
        calc(100% - 11px) calc(50% - 2px);
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 30px; cursor: pointer;
    }
    .char-count { font-size: .7rem; color: var(--muted); text-align: right; margin-top: 2px; }

    /* ── Status ── */
    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 999px; font-size: .72rem; font-weight: 700;
      padding: 4px 10px; border: 1px solid var(--border);
    }
    .status-pill.draft { color: #e8a000; border-color: rgba(249,168,37,.3); background: rgba(249,168,37,.1); }
    .status-pill.pub   { color: var(--ok);  border-color: rgba(46,125,50,.3);  background: rgba(46,125,50,.1); }
    .status-date { font-size: .76rem; color: var(--muted); }
    .status-num {
      font-family: 'Sora', sans-serif; font-size: 2.2rem; font-weight: 800;
      letter-spacing: -.03em; line-height: 1; color: var(--accent);
    }
    .status-num-label { font-size: .72rem; color: var(--muted); font-weight: 500; margin-top: 3px; }

    /* ── Image picker ── */
    .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 6px; }
    .img-opt {
      border: 2px solid var(--border); border-radius: 10px;
      cursor: pointer; overflow: hidden; transition: border-color .15s, transform .15s;
    }
    .img-opt:hover { transform: translateY(-2px); border-color: #9ab8c6; }
    .img-opt.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,111,139,.12); }
    .img-opt input { display: none; }
    .img-thumb { height: 44px; overflow: hidden; }
    .img-thumb svg { width: 100%; height: 100%; display: block; }
    .img-label { font-size: .6rem; font-weight: 700; color: var(--muted); text-align: center; padding: 3px 2px 5px; }

    /* ── Misc ── */
    .err-msg { color: var(--err); font-size: .8rem; min-height: 16px; padding: 0 2px; }
    .toast {
      position: fixed; bottom: 22px; right: 22px; z-index: 200;
      border: 1px solid var(--border); border-radius: 11px;
      background: rgba(255,255,255,.98); color: var(--text);
      padding: 10px 16px; font-size: .82rem;
      transform: translateY(12px); opacity: 0; transition: all .22s;
      pointer-events: none; box-shadow: 0 10px 25px rgba(15,45,62,.18);
    }
    .toast.show { opacity: 1; transform: none; }
    .toast.err { color: var(--err); }
    .toast.ok  { color: var(--ok); }

    @media (max-width: 700px) {
      .bento {
        grid-template-columns: 1fr;
        grid-template-areas: "editor" "meta" "img" "status" "actions";
      }
      .page { padding: 16px 12px 60px; }
    }
  </style>
</head>
<body>

<!-- SVG gradient defs for illustration thumbnails -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="g-water"  x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2d8b89"/><stop offset="100%" stop-color="#0F2A30"/></linearGradient>
  <linearGradient id="g-marsh"  x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5fb085"/><stop offset="100%" stop-color="#15433a"/></linearGradient>
  <linearGradient id="g-sunset" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0c084"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
  <linearGradient id="g-spring" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a8d8a8"/><stop offset="100%" stop-color="#2d8b60"/></linearGradient>
  <linearGradient id="g-deep"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2f3a"/><stop offset="100%" stop-color="#030d12"/></linearGradient>
</defs></svg>

<nav class="topbar">
  <a class="top-brand" href="me.html">
    <span class="top-logo">RS</span>
    Dashboard
  </a>
  <div class="top-actions">
    <a class="btn btn-ghost" href="me.html">&larr; Dashboard</a>
  </div>
</nav>

<main class="page">

  <div>
    <div class="page-eyebrow">Rivalta sul Mincio</div>
    <div class="page-title" id="page-title">Scrivi un post</div>
    <div class="page-sub"   id="page-sub">Crea un nuovo contenuto per la comunit&agrave;.</div>
  </div>

  <div class="err-msg" id="err-msg"></div>

  <div class="bento">

    <!-- ── Editor card ── -->
    <div class="card card-editor">
      <div class="field">
        <label for="f-title">Titolo</label>
        <input id="f-title" type="text" placeholder="Un titolo accattivante&hellip; (facoltativo)" maxlength="120" />
        <div class="char-count" id="title-count">0 / 120</div>
      </div>
      <div class="field">
        <label for="f-excerpt">Sommario</label>
        <input id="f-excerpt" type="text" placeholder="Breve anteprima del post&hellip; (facoltativo)" maxlength="200" />
        <div class="char-count" id="excerpt-count">0 / 200</div>
      </div>
      <div class="field" style="flex:1;display:flex;flex-direction:column">
        <label for="f-content">Contenuto *</label>
        <textarea id="f-content" placeholder="Scrivi qui il tuo contributo&hellip;" style="flex:1;min-height:260px"></textarea>
      </div>
    </div>

    <!-- ── Meta card ── -->
    <div class="card card-meta">
      <div class="card-label">Dettagli</div>
      <div class="field">
        <label for="f-category">Categoria *</label>
        <select id="f-category"></select>
      </div>
      <div style="margin-top:8px">
        <div class="card-label" style="margin-bottom:6px">Autore</div>
        <div id="meta-username" style="font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-.03em;color:var(--accent)">&ndash;</div>
        <div id="meta-displayname" style="font-size:.76rem;color:var(--muted);margin-top:2px"></div>
      </div>
    </div>

    <!-- ── Copertina card ── -->
    <div class="card card-img">
      <div class="card-label">Copertina</div>
      <div class="img-grid" id="img-grid"></div>
    </div>

    <!-- ── Status card (visible only when editing) ── -->
    <div class="card card-status" id="card-status">
      <div><span id="status-pill" class="status-pill"></span></div>
      <div style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap">
        <div>
          <div class="status-num" id="status-num">&ndash;</div>
          <div class="status-num-label" id="status-num-label">caratteri</div>
        </div>
        <div style="flex:1">
          <div class="status-date" id="status-date"></div>
        </div>
      </div>
      <button class="btn btn-danger" id="btn-delete" type="button"
        style="margin-top:6px;width:100%;justify-content:center">&times; Elimina post</button>
    </div>

    <!-- ── Actions card (dark) ── -->
    <div class="card card-actions">
      <div>
        <div class="actions-label" id="actions-label">Pronto a pubblicare?</div>
        <div class="actions-sub">Salva come bozza o pubblica subito.</div>
      </div>
      <div class="actions-btns">
        <a class="btn" href="me.html"
          style="border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)">Annulla</a>
        <button class="btn" id="btn-draft" type="button"
          style="border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff">Bozza</button>
        <button class="btn btn-primary" id="btn-publish" type="button">Pubblica</button>
      </div>
    </div>

  </div><!-- /bento -->

</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.config.js"></script>
<script src="categories.client.js"></script>
<script>
(function () {
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const $ = id => document.getElementById(id);

  const ILL_DEFS = [
    { key: 'festival', label: 'Festival',
      svg: '<svg viewBox="0 0 100 44" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="44" fill="url(#g-sunset)"/><g fill="#143B43" opacity=".85"><rect x="8" y="26" width="13" height="18"/><polygon points="6,26 15,16 24,26"/><rect x="26" y="20" width="18" height="24"/><polygon points="24,20 35,8 46,20"/><rect x="58" y="18" width="16" height="26"/><polygon points="56,18 66,6 76,18"/></g></svg>' },
    { key: 'heron', label: 'Airone',
      svg: '<svg viewBox="0 0 100 44" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="44" fill="url(#g-marsh)"/><rect x="0" y="28" width="100" height="16" fill="url(#g-water)"/><g transform="translate(45 3)"><path d="M5 20 L5 34" stroke="#0F2A30" stroke-width="1.5" stroke-linecap="round"/><path d="M1 16 Q5 10 13 15 Q17 17 19 21 Q17 24 13 23 L7 24 Q3 22 1 16Z" fill="#0F2A30"/><path d="M12 16 Q10 6 11 1" stroke="#0F2A30" stroke-width="2.5" stroke-linecap="round" fill="none"/><ellipse cx="11" cy="0" rx="3.5" ry="2.5" fill="#0F2A30"/><path d="M13 0 L18 -2" stroke="#F9A825" stroke-width="1.2" stroke-linecap="round"/></g></svg>' },
    { key: 'cycling', label: 'Ciclismo',
      svg: '<svg viewBox="0 0 100 44" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="44" fill="url(#g-spring)"/><path d="M0,30 Q50,40 100,30 L100,44 L0,44Z" fill="url(#g-water)"/><g transform="translate(42 18)"><circle cx="0" cy="7" r="5.5" fill="none" stroke="#0F2A30" stroke-width="1.5"/><circle cx="15" cy="7" r="5.5" fill="none" stroke="#0F2A30" stroke-width="1.5"/><path d="M0,7 L5,0 L11,7 L15,7" stroke="#0F2A30" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="8" cy="-6" r="2.5" fill="#0F2A30"/></g></svg>' },
    { key: 'village', label: 'Borgo',
      svg: '<svg viewBox="0 0 100 44" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="44" fill="url(#g-deep)"/><circle cx="80" cy="9" r="7" fill="#EAF4F4" opacity=".8"/><circle cx="78" cy="7" r="6" fill="#0F2A30"/><g fill="#0F2A30"><rect x="8" y="28" width="12" height="16"/><polygon points="6,28 14,18 22,28"/><rect x="37" y="15" width="5" height="29"/><polygon points="35,15 39,7 44,15"/><rect x="44" y="30" width="12" height="14"/><polygon points="42,30 50,21 58,30"/></g></svg>' },
    { key: 'reeds', label: 'Canneto',
      svg: '<svg viewBox="0 0 100 44" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="44" fill="url(#g-marsh)"/><rect x="0" y="28" width="100" height="16" fill="url(#g-water)"/><g stroke="#143B43" stroke-width="1.5" stroke-linecap="round" fill="none"><path d="M5,44 L5,18"/><path d="M13,44 L13,14"/><path d="M21,44 L21,20"/><path d="M80,44 L80,22"/><path d="M88,44 L88,15"/><path d="M96,44 L96,19"/></g><g fill="#5b3a1f"><ellipse cx="5" cy="16" rx="1.5" ry="3.5"/><ellipse cx="13" cy="12" rx="1.5" ry="3.5"/><ellipse cx="88" cy="13" rx="1.5" ry="3.5"/></g></svg>' },
    { key: 'nature', label: 'Natura',
      svg: '<svg viewBox="0 0 100 44" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="44" fill="url(#g-water)"/><ellipse cx="25" cy="38" rx="16" ry="4" fill="#43A047"/><ellipse cx="55" cy="30" rx="18" ry="4" fill="#43A047"/><ellipse cx="87" cy="40" rx="13" ry="3.5" fill="#43A047"/></svg>' },
    { key: 'fishing', label: 'Pesca',
      svg: '<svg viewBox="0 0 100 44" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="44" fill="url(#g-deep)"/><g transform="translate(20 18)"><path d="M0,0 L24,0 L22,8 L2,8Z" fill="#0F2A30"/><g transform="translate(9 -13)"><circle cx="2" cy="0" r="2.5" fill="#0F2A30"/><path d="M-1,2 L-2,10 L0,13 L3,13 L5,10 L3,2Z" fill="#0F2A30"/><path d="M3,4 L15,-5" stroke="#5b3a1f" stroke-width="1" stroke-linecap="round"/></g></g><rect x="0" y="28" width="100" height="16" fill="url(#g-water)"/></svg>' },
  ];

  const CATEGORIES = window.RSM_CATEGORIES
    ? window.RSM_CATEGORIES.all()
    : ['Eventi', 'Territorio', 'Vita locale', 'Avvisi', 'Richieste', 'Storie'];

  let session = null, profile = null, editId = null, selectedImg = null, currentPost = null;

  function escapeHtml(v) {
    return String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function toast(msg, type) {
    const el = $('toast');
    el.textContent = msg;
    el.className = 'toast show ' + (type || '');
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = 'toast'; }, 2800);
  }

  function setErr(msg) { $('err-msg').textContent = msg || ''; }

  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function autoTitle(content) {
    const c = String(content || '').replace(/\s+/g, ' ').trim();
    if (!c) return 'Nuovo post';
    return c.length <= 64 ? c : c.slice(0, 61).trim() + '\u2026';
  }

  function buildCategories() {
    $('f-category').innerHTML = CATEGORIES
      .map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`)
      .join('');
  }

  function buildImgPicker() {
    const grid = $('img-grid');
    grid.innerHTML = ILL_DEFS.map(def =>
      `<label class="img-opt" data-key="${def.key}" title="${def.label}">` +
      `<input type="radio" name="img_type" value="${def.key}" />` +
      `<div class="img-thumb">${def.svg}</div>` +
      `<div class="img-label">${def.label}</div>` +
      `</label>`
    ).join('');

    grid.querySelectorAll('.img-opt').forEach(opt => {
      opt.addEventListener('click', () => {
        grid.querySelectorAll('.img-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedImg = opt.dataset.key;
      });
    });
  }

  function selectImg(key) {
    selectedImg = key || null;
    document.querySelectorAll('.img-opt').forEach(o => {
      o.classList.toggle('selected', o.dataset.key === key);
    });
  }

  function bindCounters() {
    const titleEl   = $('f-title');
    const excerptEl = $('f-excerpt');
    const contentEl = $('f-content');
    titleEl.addEventListener('input',   () => { $('title-count').textContent   = `${titleEl.value.length} / 120`; });
    excerptEl.addEventListener('input', () => { $('excerpt-count').textContent = `${excerptEl.value.length} / 200`; });
    contentEl.addEventListener('input', () => {
      if ($('card-status').classList.contains('visible'))
        $('status-num').textContent = contentEl.value.length.toLocaleString('it-IT');
    });
  }

  async function loadPost(id) {
    const { data, error } = await sb.from('posts')
      .select('*').eq('id', id).eq('user_id', session.user.id).single();
    if (error || !data) { toast('Post non trovato o accesso negato.', 'err'); return; }
    currentPost = data;
    $('page-title').textContent        = 'Modifica post';
    $('page-sub').textContent          = 'Stai modificando un contenuto esistente.';
    $('actions-label').textContent     = data.published ? 'Aggiorna o rimuovi' : 'Pronto a pubblicare?';
    $('btn-publish').textContent       = data.published ? 'Ripubblica' : 'Pubblica';
    $('f-title').value                 = data.title   || '';
    $('f-excerpt').value               = data.excerpt || '';
    $('f-content').value               = data.content || '';
    $('f-category').value              = data.category || CATEGORIES[0];
    $('title-count').textContent       = `${(data.title   || '').length} / 120`;
    $('excerpt-count').textContent     = `${(data.excerpt || '').length} / 200`;
    if (data.image_type) selectImg(data.image_type);
    const sc   = $('card-status');
    const pill = $('status-pill');
    sc.classList.add('visible');
    if (data.published) { pill.className = 'status-pill pub';   pill.textContent = 'Pubblicato'; }
    else                { pill.className = 'status-pill draft'; pill.textContent = 'Bozza'; }
    $('status-num').textContent       = (data.content || '').length.toLocaleString('it-IT');
    $('status-num-label').textContent = 'caratteri';
    $('status-date').textContent      = data.published
      ? `Pubblicato il ${fmtDate(data.published_at)}`
      : `Ultima modifica ${fmtDate(data.updated_at || data.created_at)}`;
  }

  async function save(publish) {
    setErr('');
    const content  = $('f-content').value.trim();
    const title    = $('f-title').value.trim();
    const excerpt  = $('f-excerpt').value.trim();
    const category = $('f-category').value.trim();
    if (!content)  { setErr('Il contenuto \u00e8 obbligatorio.'); return; }
    if (!category) { setErr('Seleziona una categoria.'); return; }
    $('btn-draft').disabled = $('btn-publish').disabled = true;
    const badgeColor = window.RSM_CATEGORIES ? window.RSM_CATEGORIES.badgeColor(category) : 'default';
    const payload = {
      title:       title || autoTitle(content),
      excerpt:     excerpt || null,
      content, category,
      badge_color: badgeColor,
      image_type:  selectedImg || null,
      published:   publish,
      published_at: publish ? new Date().toISOString() : (currentPost?.published_at || null),
    };
    let error;
    if (editId) {
      ({ error } = await sb.from('posts').update(payload).eq('id', editId).eq('user_id', session.user.id));
    } else {
      let ins;
      ({ data: ins, error } = await sb.from('posts').insert({
        ...payload, user_id: session.user.id,
        author_username: profile?.username || null,
      }).select('id').single());
      if (!error && ins) {
        editId = ins.id;
        history.replaceState(null, '', `?id=${editId}`);
      }
    }
    $('btn-draft').disabled = $('btn-publish').disabled = false;
    if (error) { setErr('Errore: ' + error.message); return; }
    toast(publish ? 'Post pubblicato!' : 'Bozza salvata.', 'ok');
    if (editId) await loadPost(editId);
  }

  async function deletePost() {
    if (!editId) return;
    if (!confirm('Eliminare questo post? L\u2019azione \u00e8 irreversibile.')) return;
    const { error } = await sb.from('posts').delete().eq('id', editId).eq('user_id', session.user.id);
    if (error) { toast('Errore: ' + error.message, 'err'); return; }
    toast('Post eliminato.', 'ok');
    setTimeout(() => { window.location.href = 'me.html'; }, 900);
  }

  async function init() {
    const { data: sd } = await sb.auth.getSession();
    session = sd?.session || null;
    if (!session) { window.location.href = 'login.html'; return; }
    const { data: prof } = await sb.from('profiles')
      .select('id,username,display_name').eq('id', session.user.id).single();
    profile = prof;
    if (prof) {
      $('meta-username').textContent    = '@' + (prof.username || '\u2013');
      $('meta-displayname').textContent = prof.display_name || '';
    }
    buildCategories();
    buildImgPicker();
    bindCounters();
    const params = new URLSearchParams(location.search);
    editId = params.get('id') || null;
    if (editId) await loadPost(editId);
    $('btn-draft').addEventListener('click',   () => save(false));
    $('btn-publish').addEventListener('click', () => save(true));
    const del = $('btn-delete');
    if (del) del.addEventListener('click', deletePost);
  }

  init();
})();
</script>
</body>
</html>
