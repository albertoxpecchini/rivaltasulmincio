<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e3540"/>
      <stop offset="50%" stop-color="#1a5961"/>
      <stop offset="100%" stop-color="#2d7d6e"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d8b89"/>
      <stop offset="100%" stop-color="#0F2A30"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.75" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F6F8B"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle ripples -->
  <g stroke="#EAF4F4" stroke-width="1" fill="none" opacity=".18">
    <path d="M0,140 Q300,120 600,140 T1200,138"/>
    <path d="M0,200 Q400,180 800,200 T1200,198"/>
    <path d="M0,260 Q300,240 600,260 T1200,258"/>
  </g>

  <!-- decorative heron + lily on the right -->
  <g transform="translate(740 90)" opacity=".88">
    <!-- lily pads -->
    <ellipse cx="60" cy="430" rx="60" ry="13" fill="#2E7D32"/>
    <ellipse cx="60" cy="426" rx="60" ry="13" fill="#43A047"/>
    <ellipse cx="220" cy="445" rx="70" ry="15" fill="#2E7D32"/>
    <ellipse cx="220" cy="441" rx="70" ry="15" fill="#43A047"/>
    <ellipse cx="370" cy="430" rx="55" ry="12" fill="#2E7D32"/>
    <ellipse cx="370" cy="426" rx="55" ry="12" fill="#43A047"/>

    <!-- water lily flower -->
    <g transform="translate(60 420)">
      <circle r="11" fill="#fff"/>
      <ellipse cx="-10" cy="-3" rx="8" ry="4" fill="#fff" transform="rotate(-30)"/>
      <ellipse cx="10" cy="-3" rx="8" ry="4" fill="#fff" transform="rotate(30)"/>
      <ellipse cy="-11" rx="4" ry="8" fill="#fff"/>
      <circle r="3.5" fill="#F9A825"/>
    </g>
    <g transform="translate(220 437)">
      <circle r="9" fill="#fff"/>
      <ellipse cx="-8" cy="-2" rx="7" ry="3.5" fill="#fff" transform="rotate(-30)"/>
      <ellipse cx="8" cy="-2" rx="7" ry="3.5" fill="#fff" transform="rotate(30)"/>
      <ellipse cy="-9" rx="3.5" ry="7" fill="#fff"/>
      <circle r="3" fill="#F9A825"/>
    </g>

    <!-- heron silhouette -->
    <g transform="translate(120 80)">
      <path d="M40 220 L36 360" stroke="#0F2A30" stroke-width="4" stroke-linecap="round"/>
      <path d="M52 220 L58 360" stroke="#0F2A30" stroke-width="4" stroke-linecap="round"/>
      <path d="M14 180 Q40 158 100 175 Q140 188 165 210 Q150 224 125 222 L60 224 Q22 220 14 180 Z" fill="#0F2A30"/>
      <path d="M105 180 Q88 110 92 60" stroke="#0F2A30" stroke-width="11" stroke-linecap="round" fill="none"/>
      <ellipse cx="95" cy="55" rx="17" ry="11" fill="#0F2A30" transform="rotate(-15 95 55)"/>
      <path d="M108 53 L142 47" stroke="#F9A825" stroke-width="4.5" stroke-linecap="round"/>
      <path d="M83 47 L74 35" stroke="#0F2A30" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="98" cy="51" r="2" fill="#fff"/>
      <ellipse cx="48" cy="368" rx="28" ry="3" fill="#0F2A30" opacity=".3"/>
    </g>

    <!-- reeds -->
    <g stroke="#EAF4F4" stroke-width="2" stroke-linecap="round" fill="none" opacity=".4">
      <path d="M380 540 L380 380"/>
      <path d="M400 540 L400 360"/>
      <path d="M420 540 L420 390"/>
    </g>
  </g>

  <!-- logo + brand on left -->
  <g transform="translate(80 95)">
    <!-- logo mark -->
    <rect x="0" y="0" width="76" height="76" rx="20" fill="url(#logoGrad)"/>
    <path d="M14 50 C 26 38 50 38 62 50" stroke="#fff" stroke-width="3.6" fill="none" stroke-linecap="round"/>
    <circle cx="48" cy="36" r="2.6" fill="#fff"/>
    <path d="M22 28 q5 -4 10 0 q5 -4 10 0" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" opacity=".75"/>

    <!-- brand text -->
    <text x="98" y="36" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#EAF4F4" letter-spacing="1">PRO LOCO</text>
    <text x="98" y="64" font-family="Georgia, serif" font-size="13" fill="#a8c4c4" letter-spacing="3">RIVALTA SUL MINCIO · MANTOVA</text>
  </g>

  <!-- main headline -->
  <g transform="translate(80 235)">
    <!-- eyebrow line -->
    <line x1="0" y1="0" x2="48" y2="0" stroke="#4CAF50" stroke-width="3"/>
    <text x="64" y="6" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#a8c4c4" letter-spacing="3">PARCO DEL MINCIO</text>

    <text x="0" y="60" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#fff">Dove la natura</text>
    <text x="0" y="128" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#fff">incontra <tspan fill="#b6e5bf" font-style="italic">la storia</tspan></text>
    <text x="0" y="196" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#fff">delle <tspan fill="#b6e5bf" font-style="italic">acque</tspan>.</text>

    <text x="0" y="252" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#a8c4c4">Ecoturismo, Valli del Mincio e tradizioni del borgo.</text>
  </g>

  <!-- bottom URL bar -->
  <g transform="translate(80 555)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#EAF4F4" letter-spacing="2">www.rivaltasulmincio.it</text>
  </g>
  <g transform="translate(1120 555)" text-anchor="end">
    <circle cx="-110" cy="-7" r="4" fill="#4CAF50"/>
    <text x="-95" y="0" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#a8c4c4" letter-spacing="2">PRO LOCO · MN</text>
  </g>

  <!-- bottom wave -->
  <path d="M0,580 Q300,605 600,580 T1200,580 L1200,630 L0,630 Z" fill="url(#water)"/>
</svg>
