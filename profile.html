<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilo – Rivalta sul Mincio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      color-scheme: light;
      --bg: #eef6f4; --surface: #ffffff; --surface-2: #f0f7f5; --border: #c8deda;
      --text: #0d2830; --muted: #537575; --p: #1F6F8B; --a: #3a8c8a; --g: #2E7D32;
      --radius: 16px;
    }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 15% 12%, rgba(31,111,139,.10), transparent 42%),
                  radial-gradient(circle at 88% 88%, rgba(46,125,50,.08), transparent 36%),
                  var(--bg);
      color: var(--text); font-family: 'Inter', system-ui, sans-serif; line-height: 1.5; overflow-x: hidden;
    }
    a { color: var(--a); text-decoration: none; }

    /* ── Aurora ─────────────────────────────────────────────── */
    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(130px); }
    .orb-1 { width: 760px; height: 760px; background: radial-gradient(circle, #1F6F8B 0%, transparent 58%); top:-250px; left:-160px; opacity:.08; animation: orbA 24s ease-in-out infinite alternate; }
    .orb-2 { width: 520px; height: 520px; background: radial-gradient(circle, #2E7D32 0%, transparent 62%); bottom:-200px; right:-120px; opacity:.06; animation: orbB 20s ease-in-out infinite alternate; }
    @keyframes orbA { to { transform: translate(90px,55px) scale(1.08); } }
    @keyframes orbB { to { transform: translate(-70px,-45px) scale(1.12); } }

    /* ── Topbar ─────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 8px; z-index: 20;
      height: 52px; border: 1px solid var(--border); border-radius: 14px;
      background: rgba(255,255,255,.94); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 0 14px; box-shadow: 0 8px 24px rgba(15,45,62,.08);
      margin: 10px 16px 0;
    }
    .top-brand { display: inline-flex; align-items: center; gap: 8px; color: var(--text); text-decoration: none; font-family: 'Fraunces', Georgia, serif; font-size: .92rem; }
    .top-logo { width: 30px; height: 30px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg,#1F6F8B,#3a8c8a); font-size: .9rem; color: #fff; flex-shrink: 0; }
    .top-actions { display: flex; align-items: center; gap: 8px; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-family: inherit; font-size: .82rem; font-weight: 600; padding: 7px 13px;
      cursor: pointer; text-decoration: none; transition: all .2s;
    }
    .btn:hover { transform: translateY(-1px); border-color: #aac0cc; }
    .btn-primary { border-color: transparent; background: linear-gradient(135deg,#1F6F8B,#3a8c8a); color: #fff; box-shadow: 0 6px 20px rgba(31,111,139,.28); }
    .btn-primary:hover { box-shadow: 0 10px 28px rgba(31,111,139,.4); }
    .btn-ghost { color: var(--muted); }

    /* ── Page ────────────────────────────────────────────────── */
    .page { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; display: grid; gap: 14px; }

    /* ── Card ────────────────────────────────────────────────── */
    .card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); padding: 20px; }

    /* ── Bento ───────────────────────────────────────────────── */
    .bento { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .tile-profile  { grid-column: 1 / 3; }
    .tile-stats    { grid-column: 3 / 4; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
    .tile-actions  { grid-column: 1 / 4; display: none; }
    .tile-actions.visible { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    /* ── Profile tile ────────────────────────────────────────── */
    .profile-inner { display: flex; align-items: flex-start; gap: 18px; flex-wrap: wrap; }
    .avatar-wrap { position: relative; flex-shrink: 0; }
    .avatar-ring {
      position: absolute; inset: -4px; border-radius: 22px;
      background: conic-gradient(from 0deg, #1F6F8B 0%, #3a8c8a 30%, #2E7D32 60%, #F9A825 80%, #1F6F8B 100%);
      animation: spin 8s linear infinite; filter: blur(1.5px); z-index: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar {
      position: relative; z-index: 1; width: 88px; height: 88px; border-radius: 20px;
      display: flex; align-items: center; justify-content: center; font-size: 2.6rem;
      border: 2px solid rgba(255,255,255,.9); box-shadow: 0 8px 24px rgba(31,111,139,.2);
    }
    .profile-info { flex: 1; min-width: 180px; }
    .profile-username { font-family: 'Fraunces', Georgia, serif; font-size: 1.5rem; font-weight: 700; line-height: 1.1; margin-bottom: 3px; }
    .profile-displayname { font-size: .9rem; color: var(--muted); margin-bottom: 12px; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .chip { border: 1px solid var(--border); border-radius: 999px; background: var(--surface-2); color: var(--muted); padding: 5px 11px; font-size: .75rem; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
    .chip-admin { color: #b8860b; border-color: rgba(249,168,37,.3); background: rgba(249,168,37,.1); }
    .profile-bio { font-size: .87rem; color: var(--muted); line-height: 1.6; max-width: 420px; }

    /* ── Stat blocks ──────────────────────────────────────────── */
    .stat-block { border: 1px solid var(--border); border-radius: 12px; background: var(--surface-2); padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; }
    .stat-n { font-family: 'Fraunces', Georgia, serif; font-size: 1.9rem; font-weight: 700; line-height: 1; background: linear-gradient(135deg, #0d2830, #1F6F8B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-l { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-weight: 700; }

    /* ── Section header ───────────────────────────────────────── */
    .section-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .section-title h2 { font-family: 'Fraunces', Georgia, serif; font-size: 1.1rem; }
    .section-title p { color: var(--muted); font-size: .8rem; }

    /* ── Posts grid ───────────────────────────────────────────── */
    .grid-posts { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin-top: 14px; }

    /* ── Post card ────────────────────────────────────────────── */
    .pcard { border: 1px solid var(--border); border-radius: 14px; background: var(--surface); overflow: hidden; transition: transform .22s, box-shadow .22s; box-shadow: 0 2px 12px rgba(13,40,48,.06); }
    .pcard:hover { transform: translateY(-4px); box-shadow: 0 14px 36px rgba(13,40,48,.13), 0 0 0 1px rgba(58,140,138,.25); }
    .pcard-img { height: 130px; overflow: hidden; position: relative; background: var(--surface-2); }
    .pcard-img svg { width: 100%; height: 100%; display: block; }
    .pcard-cat { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,.92); backdrop-filter: blur(6px); font-size: .7rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; letter-spacing: .05em; text-transform: uppercase; border: 1px solid rgba(58,140,138,.25); color: var(--a); }
    .pcard-cat-green { color: #2E7D32; border-color: rgba(46,125,50,.3); }
    .pcard-body { padding: 14px; }
    .pcard-meta { font-size: .72rem; color: var(--muted); margin-bottom: 7px; }
    .pcard-title { font-family: 'Fraunces', Georgia, serif; font-size: .96rem; line-height: 1.4; margin-bottom: 8px; }
    .pcard-title a { color: var(--text); transition: color .2s; }
    .pcard-title a:hover { color: var(--a); }
    .pcard-exc { font-size: .81rem; color: var(--muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; }
    .pcard-foot { padding-top: 10px; border-top: 1px solid var(--border); }
    .btn-read { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 999px; font-size: .78rem; font-weight: 600; background: linear-gradient(135deg,#1F6F8B,#3a8c8a); color: #fff; box-shadow: 0 3px 10px rgba(31,111,139,.25); text-decoration: none; transition: transform .2s, box-shadow .2s, gap .2s; border: none; font-family: inherit; cursor: pointer; }
    .btn-read:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(31,111,139,.4); gap: 10px; color: #fff; }

    /* ── Empty ────────────────────────────────────────────────── */
    .empty-state { border: 1px dashed #b8cad6; border-radius: 12px; background: #f8fbfd; padding: 40px 20px; text-align: center; display: grid; gap: 8px; }
    .empty-state span { font-size: 2.5rem; }
    .empty-state p { color: var(--muted); font-size: .87rem; }

    /* ── Skeleton ─────────────────────────────────────────────── */
    .skel { background: linear-gradient(90deg, rgba(0,0,0,.06) 25%, rgba(0,0,0,.10) 50%, rgba(0,0,0,.06) 75%); background-size: 400% 100%; animation: shimmer 1.4s ease-in-out infinite; border-radius: 8px; }
    @keyframes shimmer { to { background-position: -400% 0; } }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 680px) {
      .bento { grid-template-columns: 1fr; }
      .tile-profile, .tile-stats, .tile-actions { grid-column: 1; }
      .tile-stats { flex-direction: row; }
      .stat-block { flex: 1; }
    }
    @media (max-width: 440px) {
      .topbar { margin: 8px 10px 0; }
      .page { padding: 14px 10px 60px; }
    }
  </style>
</head>
<body>

<div class="aurora"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="grad-water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2d8b89"/><stop offset="100%" stop-color="#0F2A30"/></linearGradient>
  <linearGradient id="grad-marsh" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5fb085"/><stop offset="100%" stop-color="#15433a"/></linearGradient>
  <linearGradient id="grad-sunset" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0c084"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
  <linearGradient id="grad-spring" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a8d8a8"/><stop offset="100%" stop-color="#2d8b60"/></linearGradient>
  <linearGradient id="grad-deep" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2f3a"/><stop offset="100%" stop-color="#030d12"/></linearGradient>
</defs></svg>

<nav class="topbar">
  <a class="top-brand" href="index.html">
    <span class="top-logo">🌿</span>
    Rivalta sul Mincio
  </a>
  <div class="top-actions">
    <a href="index.html" class="btn btn-ghost">← Home</a>
  </div>
</nav>

<div class="page">

  <div class="bento">

    <!-- Profile -->
    <div class="card tile-profile">
      <div class="profile-inner">
        <div class="avatar-wrap">
          <div class="avatar-ring"></div>
          <div class="avatar skel" id="avatar" style="background:#e0eff4"></div>
        </div>
        <div class="profile-info">
          <div class="profile-username skel" id="username" style="width:140px;height:24px;margin-bottom:6px"></div>
          <div class="profile-displayname skel" id="displayname" style="width:100px;height:14px;margin-bottom:14px"></div>
          <div class="chips" id="chips"></div>
          <div class="profile-bio" id="bio"></div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="card tile-stats">
      <div class="stat-block">
        <div class="stat-n skel" id="stat-posts" style="width:48px;height:30px"></div>
        <div class="stat-l">Articoli</div>
      </div>
      <div class="stat-block">
        <div class="stat-n skel" id="stat-since" style="width:90px;height:30px"></div>
        <div class="stat-l">Membro da</div>
      </div>
    </div>

    <!-- Actions (own profile only) -->
    <div class="card tile-actions" id="tile-actions"></div>

  </div>

  <!-- Posts -->
  <div class="card">
    <div class="section-title">
      <h2>Articoli pubblicati</h2>
      <p id="posts-count"></p>
    </div>
    <div class="grid-posts" id="posts-grid"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.config.js"></script>
<script src="categories.client.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const fmt = iso => new Date(iso).toLocaleDateString('it-IT', {day:'numeric',month:'short',year:'numeric'});
const fmtY = iso => new Date(iso).toLocaleDateString('it-IT', {month:'long',year:'numeric'});
const canonicalCategory = v => window.RSM_CATEGORIES ? window.RSM_CATEGORIES.canonical(v) : String(v||'').trim();
const categoryHref = v => window.RSM_CATEGORIES ? window.RSM_CATEGORIES.categoryHref(v) : ('category.html?name='+encodeURIComponent(canonicalCategory(v)));
const badgeColorByCategory = v => window.RSM_CATEGORIES ? window.RSM_CATEGORIES.badgeColor(v) : 'default';
const escapeHtml = v => String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

const ILL = {
  festival:`<svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="130" fill="url(#grad-sunset)"/><g fill="#143B43" opacity=".85"><rect x="40" y="72" width="60" height="58"/><polygon points="32,72 70,44 108,72"/><rect x="100" y="58" width="80" height="72"/><polygon points="92,58 140,24 188,58"/><rect x="240" y="52" width="70" height="78"/><polygon points="232,52 275,18 318,52"/></g></svg>`,
  heron:`<svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="130" fill="url(#grad-marsh)"/><rect x="0" y="82" width="400" height="48" fill="url(#grad-water)"/><g transform="translate(180 10)"><path d="M22 64 L20 100" stroke="#0F2A30" stroke-width="2.5" stroke-linecap="round"/><path d="M5 48 Q25 34 60 46 Q80 52 90 62 Q82 72 65 70 L30 72 Q10 68 5 48Z" fill="#0F2A30"/><path d="M55 50 Q45 22 50 3" stroke="#0F2A30" stroke-width="6" stroke-linecap="round" fill="none"/><ellipse cx="52" cy="0" rx="9" ry="6" fill="#0F2A30" transform="rotate(-15 52 0)"/><path d="M58 -1 L76 -4" stroke="#F9A825" stroke-width="2.5" stroke-linecap="round"/></g></svg>`,
  cycling:`<svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="130" fill="url(#grad-spring)"/><path d="M0,92 Q200,114 400,92 L400,130 L0,130Z" fill="url(#grad-water)"/><g transform="translate(170 52)"><circle cx="0" cy="20" r="13" fill="none" stroke="#0F2A30" stroke-width="2.5"/><circle cx="40" cy="20" r="13" fill="none" stroke="#0F2A30" stroke-width="2.5"/><path d="M0,20 L15,-2 L30,20 L40,20" stroke="#0F2A30" stroke-width="2.5" fill="none" stroke-linecap="round"/><circle cx="22" cy="-20" r="6" fill="#0F2A30"/></g></svg>`,
  village:`<svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="130" fill="url(#grad-deep)"/><circle cx="320" cy="26" r="18" fill="#EAF4F4" opacity=".8"/><circle cx="313" cy="22" r="16" fill="#0F2A30"/><g fill="#0F2A30"><rect x="30" y="82" width="50" height="48"/><polygon points="22,82 55,56 88,82"/><rect x="148" y="44" width="22" height="86"/><polygon points="142,44 159,22 176,44"/><rect x="170" y="92" width="50" height="38"/><polygon points="162,92 195,66 228,92"/></g></svg>`,
  reeds:`<svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="130" fill="url(#grad-marsh)"/><rect x="0" y="84" width="400" height="46" fill="url(#grad-water)"/><g stroke="#143B43" stroke-width="2.5" stroke-linecap="round" fill="none"><path d="M20,130 L20,60"/><path d="M50,130 L50,52"/><path d="M80,130 L80,66"/><path d="M310,130 L310,72"/><path d="M340,130 L340,56"/><path d="M370,130 L370,64"/></g><g fill="#5b3a1f"><ellipse cx="20" cy="58" rx="3" ry="8"/><ellipse cx="50" cy="50" rx="3" ry="8"/><ellipse cx="80" cy="64" rx="3" ry="8"/><ellipse cx="340" cy="54" rx="3" ry="8"/></g></svg>`,
  nature:`<svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="130" fill="url(#grad-water)"/><ellipse cx="100" cy="118" rx="38" ry="8" fill="#43A047"/><ellipse cx="220" cy="92" rx="45" ry="9" fill="#43A047"/><ellipse cx="360" cy="122" rx="40" ry="8" fill="#43A047"/></svg>`,
  fishing:`<svg viewBox="0 0 400 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="130" fill="url(#grad-deep)"/><g transform="translate(80 54)"><path d="M0,0 L100,0 L92,22 L8,22Z" fill="#0F2A30"/><g transform="translate(40 -38)"><circle cx="5" cy="0" r="6" fill="#0F2A30"/><path d="M-2,5 L-5,30 L0,38 L8,38 L12,30 L8,5Z" fill="#0F2A30"/><path d="M8,12 L40,-15" stroke="#5b3a1f" stroke-width="2" stroke-linecap="round"/></g></g><rect x="0" y="84" width="400" height="46" fill="url(#grad-water)"/></svg>`,
};

const un = new URLSearchParams(location.search).get('u');
if (!un) location.href = 'index.html';

(async function () {
  let session = null;
  try { const {data} = await sb.auth.getSession(); session = data?.session || null; } catch (_) {}

  const {data:prof, error:pe} = await sb.from('profiles').select('*').eq('username',un).single();
  if (pe || !prof) {
    document.querySelector('.bento').innerHTML = '<div class="card" style="grid-column:1/-1;padding:60px;text-align:center;color:var(--muted)">Profilo non trovato.</div>';
    return;
  }
  document.title = `@${prof.username} – Rivalta sul Mincio`;

  /* Avatar */
  const av = $('avatar');
  av.classList.remove('skel'); av.style.background = prof.avatar_color || '#e0eff4'; av.textContent = prof.avatar_emoji || '🌿';

  /* Name */
  $('username').outerHTML = `<div class="profile-username" id="username">@${escapeHtml(prof.username)}</div>`;
  $('displayname').outerHTML = `<div class="profile-displayname">${escapeHtml(prof.display_name||prof.username)}</div>`;

  /* Chips */
  const roleLabels = {admin:'⚙️ Admin', user:'👤 Utente', reader:'👁 Lettore'};
  const chipsHtml = [];
  if (prof.comune) chipsHtml.push(`<span class="chip">📍 ${escapeHtml(prof.comune)}</span>`);
  chipsHtml.push(`<span class="chip ${prof.role==='admin'?'chip-admin':''}">${roleLabels[prof.role]||'👤 Utente'}</span>`);
  $('chips').innerHTML = chipsHtml.join('');
  if (prof.bio) $('bio').textContent = prof.bio;

  /* Stats */
  const {count} = await sb.from('posts').select('id',{count:'exact',head:true}).eq('user_id',prof.id).eq('published',true);
  const pe2 = $('stat-posts'); pe2.classList.remove('skel'); pe2.style=''; pe2.textContent = count||0;
  const se = $('stat-since'); se.classList.remove('skel'); se.style=''; se.textContent = fmtY(prof.created_at);

  /* Own-profile actions */
  if (session?.user?.id === prof.id) {
    const tile = $('tile-actions');
    tile.classList.add('visible');
    tile.innerHTML = `<a href="me.html" class="btn btn-primary">✏️ Modifica profilo</a><a href="me.html#write" class="btn btn-ghost">+ Scrivi articolo</a>`;
  }

  /* Posts */
  const {data:posts} = await sb.from('posts')
    .select('id,title,excerpt,category,image_type,published_at')
    .eq('user_id',prof.id).eq('published',true)
    .order('published_at',{ascending:false});

  const grid = $('posts-grid');
  if (!posts || posts.length===0) {
    grid.innerHTML = '<div class="empty-state"><span>📝</span><p>Nessun articolo pubblicato ancora.</p></div>';
    return;
  }
  $('posts-count').textContent = `${posts.length} articol${posts.length===1?'o':'i'}`;

  grid.innerHTML = posts.map(p => {
    const cat = canonicalCategory(p.category) || 'Territorio';
    const color = badgeColorByCategory(cat);
    return `<article class="pcard">
      <div class="pcard-img">
        <a class="pcard-cat ${color==='green'?'pcard-cat-green':''}" href="${categoryHref(cat)}">${escapeHtml(cat)}</a>
        ${ILL[p.image_type]||ILL.nature}
      </div>
      <div class="pcard-body">
        <div class="pcard-meta">${fmt(p.published_at)}</div>
        <div class="pcard-title"><a href="post.html?id=${p.id}">${escapeHtml(p.title||'Articolo')}</a></div>
        ${p.excerpt?`<div class="pcard-exc">${escapeHtml(p.excerpt)}</div>`:''}
        <div class="pcard-foot"><a href="post.html?id=${p.id}" class="btn-read">Leggi →</a></div>
      </div>
    </article>`;
  }).join('');
})();
</script>
</body>
</html>
