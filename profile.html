<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilo – Rivalta sul Mincio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #eef6f4; --bg2: #e4f0ec; --glass: rgba(255,255,255,.75); --border: #c8deda;
      --text: #0d2830; --muted: #537575; --p: #1F6F8B; --a: #3a8c8a; --g: #2E7D32;
    }
    html { scroll-behavior: smooth; }
    body { background: radial-gradient(circle at 8% 8%, rgba(31,111,139,.09), transparent 42%), radial-gradient(circle at 92% 92%, rgba(46,125,50,.07), transparent 38%), var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
    a { color: var(--a); text-decoration: none; }

    /* ── Aurora bg ───────────────────────────────────────────────── */
    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); }
    .orb-1 { width: 900px; height: 900px; background: radial-gradient(circle, #1F6F8B 0%, transparent 55%); top:-300px; left:-250px; opacity:.07; animation: o1 22s ease-in-out infinite alternate; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #2E7D32 0%, transparent 60%); bottom:-150px; right:-100px; opacity:.05; animation: o2 18s ease-in-out infinite alternate; }
    @keyframes o1 { to { transform: translate(80px,60px) scale(1.1); } }
    @keyframes o2 { to { transform: translate(-60px,-40px) scale(1.2); } }
    .grid { position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(0,0,0,.025) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,.025) 1px, transparent 1px);
            background-size: 60px 60px; }

    /* ── Top bar ─────────────────────────────────────────────────── */
    .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100;
              padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between;
              background: rgba(13,40,48,.9); backdrop-filter: blur(16px);
              border-bottom: 1px solid rgba(31,111,139,.25); }
    .topbar-brand { font-family: 'Fraunces', Georgia, serif; font-size: .95rem;
                    background: linear-gradient(135deg, #EAF4F4, #3a8c8a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .nav-pill { padding: 6px 14px; border-radius: 20px; font-size: .8rem; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
    .nav-pill-ghost { background: rgba(255,255,255,.12); color: rgba(234,244,244,.8); border: 1px solid rgba(255,255,255,.2); }
    .nav-pill-ghost:hover { color: #fff; background: rgba(255,255,255,.2); }
    .nav-pill-primary { background: linear-gradient(135deg, #1F6F8B, #3a8c8a); color: #fff; }

    /* ── Hero ────────────────────────────────────────────────────── */
    .hero { position: relative; z-index: 1; padding: 120px 20px 60px; text-align: center; }
    .avatar-wrap { position: relative; display: inline-block; margin-bottom: 24px; }
    .avatar-ring {
      position: absolute; inset: -5px; border-radius: 30px;
      background: conic-gradient(from 0deg, #1F6F8B, #3a8c8a, #2E7D32, #F9A825, #1F6F8B);
      animation: spin 6s linear infinite; filter: blur(1px);
      z-index: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar {
      position: relative; z-index: 1;
      width: 108px; height: 108px; border-radius: 26px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      box-shadow: 0 16px 48px rgba(31,111,139,.25);
      border: 2px solid rgba(31,111,139,.2);
    }
    .username { font-family: 'Fraunces', Georgia, serif; font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
    .displayname { font-size: 1rem; color: var(--muted); margin-bottom: 12px; }
    .bio { max-width: 420px; margin: 0 auto 24px; font-size: .92rem; color: var(--muted); line-height: 1.6; }
    .stats-row { display: inline-flex; gap: 0; background: rgba(255,255,255,.8);
                 border: 1px solid var(--border); border-radius: 14px; overflow: hidden; backdrop-filter: blur(8px); }
    .stat { padding: 12px 28px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat + .stat { border-left: 1px solid var(--border); }
    .stat-n { font-size: 1.4rem; font-weight: 700;
               background: linear-gradient(135deg, #0d2830, #1F6F8B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-l { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .hero-actions { margin-top: 24px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: 12px;
           font-size: .88rem; font-weight: 600; font-family: inherit; cursor: pointer; border: none; transition: all .2s; }
    .btn-primary { background: linear-gradient(135deg, #1F6F8B, #3a8c8a); color: #fff;
                   box-shadow: 0 4px 20px rgba(31,111,139,.35); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(31,111,139,.5); }
    .btn-ghost { background: rgba(0,0,0,.05); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); background: rgba(0,0,0,.09); }

    /* ── Divider ─────────────────────────────────────────────────── */
    .divider { position: relative; z-index: 1; max-width: 960px; margin: 0 auto;
               padding: 0 20px 12px;
               display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .divider h2 { font-family: 'Fraunces', Georgia, serif; font-size: 1.1rem; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }

    /* ── Posts grid ──────────────────────────────────────────────── */
    .posts { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 20px 80px; }
    .grid-posts { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .pcard {
      background: rgba(255,255,255,.88); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 18px; overflow: hidden;
      transition: transform .25s, box-shadow .25s;
      box-shadow: 0 4px 20px rgba(13,40,48,.08);
    }
    .pcard:hover { transform: translateY(-6px); box-shadow: 0 20px 48px rgba(13,40,48,.14), 0 0 0 1px rgba(58,140,138,.3); }
    .pcard-img { height: 160px; overflow: hidden; position: relative; }
    .pcard-img svg { width: 100%; height: 100%; display: block; }
    .pcard-cat { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,.88);
                 backdrop-filter: blur(8px); color: var(--a); font-size: .72rem; font-weight: 700;
                 padding: 4px 10px; border-radius: 20px; letter-spacing: .04em; text-transform: uppercase;
                 border: 1px solid rgba(58,140,138,.3); }
    .pcard-cat-green { color: #2E7D32; border-color: rgba(46,125,50,.35); background: rgba(255,255,255,.9); }
    .pcard-cat-default { color: #1F6F8B; border-color: rgba(31,111,139,.3); background: rgba(255,255,255,.88); }
    .pcard-body { padding: 18px; }
    .pcard-meta { font-size: .75rem; color: var(--muted); margin-bottom: 8px; }
    .pcard-title { font-family: 'Fraunces', Georgia, serif; font-size: 1rem; line-height: 1.4; margin-bottom: 8px; }
    .pcard-title a { color: var(--text); transition: color .2s; }
    .pcard-title a:hover { color: var(--a); }
    .pcard-exc { font-size: .83rem; color: var(--muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 14px; }
    .pcard-foot { padding-top: 12px; border-top: 1px solid var(--border); margin-top: 4px; }
    .btn-read {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 20px; font-size: .8rem; font-weight: 600;
      background: linear-gradient(135deg,#1F6F8B,#3a8c8a); color: #fff;
      box-shadow: 0 3px 12px rgba(31,111,139,.3); text-decoration: none;
      transition: transform .2s, box-shadow .2s, gap .2s; border: none;
    }
    .btn-read:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(31,111,139,.45); gap: 10px; color: #fff; }

    /* ── Empty state ──────────────────────────────────────────────── */
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty span { font-size: 3rem; display: block; margin-bottom: 16px; }
    .empty p { font-size: .92rem; }

    /* ── Skeleton ─────────────────────────────────────────────────── */
    .skel { background: linear-gradient(90deg, rgba(0,0,0,.06) 25%, rgba(0,0,0,.10) 50%, rgba(0,0,0,.06) 75%);
            background-size: 400% 100%; animation: shimmer 1.4s ease-in-out infinite; border-radius: 8px; }
    @keyframes shimmer { to { background-position: -400% 0; } }

    @media (max-width: 600px) {
      .stats-row { flex-direction: column; }
      .stat + .stat { border-left: none; border-top: 1px solid var(--border); }
      .username { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="aurora"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="grid"></div>

<div class="topbar">
  <a class="topbar-brand" href="index.html">Rivalta sul Mincio</a>
  <div class="topbar-right" id="nav-right">
    <button class="nav-pill nav-pill-ghost" onclick="location.href='index.html'">Home</button>
  </div>
</div>

<div class="hero" id="hero">
  <div class="avatar-wrap">
    <div class="avatar-ring"></div>
    <div class="avatar skel" id="avatar" style="background:#1F6F8B"></div>
  </div>
  <div class="username skel" id="username" style="width:160px;height:28px;margin:0 auto 8px"></div>
  <div class="displayname skel" id="displayname" style="width:120px;height:16px;margin:0 auto 10px"></div>
  <div id="meta-row" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px"></div>
  <div class="bio" id="bio"></div>
  <div class="stats-row" id="stats">
    <div class="stat"><div class="stat-n skel" style="width:30px;height:24px"></div><div class="stat-l">Post</div></div>
    <div class="stat"><div class="stat-n skel" style="width:60px;height:24px"></div><div class="stat-l">Membro da</div></div>
  </div>
  <div class="hero-actions" id="hero-actions"></div>
</div>

<div class="divider"><div class="divider-line"></div><h2>Articoli</h2><div class="divider-line"></div></div>
<div class="posts"><div class="grid-posts" id="posts-grid"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.config.js"></script>
<script src="categories.client.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
const fmt = iso => new Date(iso).toLocaleDateString('it-IT', {day:'numeric',month:'short',year:'numeric'});
const fmtY = iso => new Date(iso).toLocaleDateString('it-IT', {month:'long',year:'numeric'});
const canonicalCategory = (value) => window.RSM_CATEGORIES
  ? window.RSM_CATEGORIES.canonical(value)
  : String(value || '').trim();
const categoryHref = (value) => window.RSM_CATEGORIES
  ? window.RSM_CATEGORIES.categoryHref(value)
  : ('category.html?name=' + encodeURIComponent(canonicalCategory(value)));
const badgeColorByCategory = (value) => window.RSM_CATEGORIES
  ? window.RSM_CATEGORIES.badgeColor(value)
  : 'default';
const escapeHtml = (value) => String(value || '')
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;')
  .replace(/'/g, '&#39;');

const un = new URLSearchParams(location.search).get('u');
if(!un) location.href = 'index.html';

const ILL = {
  festival:`<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="160" fill="url(#grad-sunset)"/><g fill="#143B43" opacity=".85"><rect x="40" y="90" width="60" height="70"/><polygon points="32,90 70,58 108,90"/><rect x="100" y="75" width="80" height="85"/><polygon points="92,75 140,38 188,75"/><rect x="240" y="70" width="70" height="90"/><polygon points="232,70 275,35 318,70"/></g><path d="M30,50 Q200,80 370,40" stroke="#fff" stroke-width="1" fill="none" opacity=".4"/><g fill="#F9A825"><circle cx="80" cy="62" r="2.5"/><circle cx="180" cy="74" r="2.5"/><circle cx="290" cy="58" r="2.5"/></g></svg>`,
  heron:`<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="160" fill="url(#grad-marsh)"/><rect x="0" y="100" width="400" height="60" fill="url(#grad-water)"/><g transform="translate(180 20)"><path d="M22 80 L20 130" stroke="#0F2A30" stroke-width="2.5" stroke-linecap="round"/><path d="M5 60 Q25 45 60 58 Q80 65 90 75 Q82 85 65 83 L30 85 Q10 82 5 60Z" fill="#0F2A30"/><path d="M55 62 Q45 30 50 8" stroke="#0F2A30" stroke-width="6" stroke-linecap="round" fill="none"/><ellipse cx="52" cy="5" rx="9" ry="6" fill="#0F2A30" transform="rotate(-15 52 5)"/><path d="M58 4 L78 0" stroke="#F9A825" stroke-width="2.5" stroke-linecap="round"/></g></svg>`,
  cycling:`<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="160" fill="url(#grad-spring)"/><path d="M0,110 Q200,140 400,110 L400,160 L0,160Z" fill="url(#grad-water)"/><path d="M-20,118 Q120,105 280,118 T420,113" stroke="#EAF4F4" stroke-width="18" fill="none" opacity=".6"/><g transform="translate(170 78)"><circle cx="0" cy="20" r="13" fill="none" stroke="#0F2A30" stroke-width="2.5"/><circle cx="40" cy="20" r="13" fill="none" stroke="#0F2A30" stroke-width="2.5"/><path d="M0,20 L15,-2 L30,20 L40,20" stroke="#0F2A30" stroke-width="2.5" fill="none" stroke-linecap="round"/><circle cx="22" cy="-20" r="6" fill="#0F2A30"/></g></svg>`,
  village:`<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="160" fill="url(#grad-deep)"/><circle cx="320" cy="35" r="22" fill="#EAF4F4" opacity=".8"/><circle cx="312" cy="30" r="19" fill="#0F2A30"/><g fill="#0F2A30"><rect x="30" y="100" width="50" height="60"/><polygon points="22,100 55,72 88,100"/><rect x="148" y="60" width="22" height="100"/><polygon points="142,60 159,36 176,60"/><rect x="170" y="110" width="50" height="50"/><polygon points="162,110 195,82 228,110"/></g><g fill="#F9A825" opacity=".9"><rect x="42" y="118" width="5" height="7"/><rect x="180" y="125" width="5" height="7"/></g><rect x="0" y="130" width="400" height="30" fill="url(#grad-water)"/></svg>`,
  reeds:`<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="160" fill="url(#grad-marsh)"/><rect x="0" y="100" width="400" height="60" fill="url(#grad-water)"/><g stroke="#143B43" stroke-width="2.5" stroke-linecap="round" fill="none"><path d="M20,160 L20,80"/><path d="M50,160 L50,70"/><path d="M80,160 L80,85"/><path d="M310,160 L310,90"/><path d="M340,160 L340,75"/><path d="M370,160 L370,82"/></g><g fill="#5b3a1f"><ellipse cx="20" cy="78" rx="3" ry="10"/><ellipse cx="50" cy="68" rx="3" ry="10"/><ellipse cx="80" cy="83" rx="3" ry="10"/><ellipse cx="340" cy="73" rx="3" ry="10"/></g></svg>`,
  nature:`<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="160" fill="url(#grad-water)"/><g><ellipse cx="100" cy="140" rx="38" ry="9" fill="#43A047"/><ellipse cx="220" cy="110" rx="45" ry="10" fill="#43A047"/><ellipse cx="360" cy="145" rx="40" ry="9" fill="#43A047"/></g><g transform="translate(220 107)"><circle r="8" fill="#fff"/><ellipse cx="-7" cy="-2" rx="6" ry="3" fill="#fff" transform="rotate(-30)"/><ellipse cx="7" cy="-2" rx="6" ry="3" fill="#fff" transform="rotate(30)"/><circle r="2.5" fill="#F9A825"/></g></svg>`,
  fishing:`<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="400" height="160" fill="url(#grad-deep)"/><g transform="translate(80 70)"><path d="M0,0 L100,0 L92,22 L8,22Z" fill="#0F2A30"/><g transform="translate(40 -38)"><circle cx="5" cy="0" r="6" fill="#0F2A30"/><path d="M-2,5 L-5,30 L0,38 L8,38 L12,30 L8,5Z" fill="#0F2A30"/><path d="M8,12 L40,-15" stroke="#5b3a1f" stroke-width="2" stroke-linecap="round"/></g></g><rect x="0" y="100" width="400" height="60" fill="url(#grad-water)"/></svg>`,
};

/* shared SVG defs needed by illustrations */
const DEFS = `<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <linearGradient id="grad-water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2d8b89"/><stop offset="100%" stop-color="#0F2A30"/></linearGradient>
  <linearGradient id="grad-marsh" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5fb085"/><stop offset="100%" stop-color="#15433a"/></linearGradient>
  <linearGradient id="grad-sunset" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f0c084"/><stop offset="100%" stop-color="#c0392b"/></linearGradient>
  <linearGradient id="grad-spring" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a8d8a8"/><stop offset="100%" stop-color="#2d8b60"/></linearGradient>
  <linearGradient id="grad-deep" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2f3a"/><stop offset="100%" stop-color="#030d12"/></linearGradient>
</defs></svg>`;
document.body.insertAdjacentHTML('afterbegin', DEFS);

(async function() {
  /* Load profile */
  const {data:prof, error:pe} = await sb.from('profiles').select('*').eq('username',un).single();
  if(pe || !prof) { document.querySelector('.hero').innerHTML = '<p style="padding:80px;color:rgba(234,244,244,.4);text-align:center">Profilo non trovato.</p>'; return; }
  document.title = `@${prof.username} – Rivalta sul Mincio`;

  /* Render hero */
  const av = $('avatar');
  av.classList.remove('skel');
  av.style.background = prof.avatar_color || '#1F6F8B';
  av.textContent = prof.avatar_emoji || '🌿';

  $('username').outerHTML = `<div class="username" id="username">@${prof.username}</div>`;
  $('displayname').outerHTML = `<div class="displayname">${prof.display_name || prof.username}</div>`;

  const roleLabels = { admin: '⚙️ Admin', user: '👤 Utente', reader: '👁 Lettore' };
  const roleStyle = prof.role === 'admin'
    ? 'background:rgba(249,168,37,.12);color:#ffd54f;border:1px solid rgba(249,168,37,.25)'
    : 'background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)';
  const chipBase = 'padding:5px 12px;border-radius:20px;font-size:.75rem;font-weight:600';
  const chips = [];
  if(prof.comune) chips.push(`<span style="${chipBase};background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)">📍 ${prof.comune}</span>`);
  chips.push(`<span style="${chipBase};${roleStyle}">${roleLabels[prof.role] || '👤 Utente'}</span>`);
  $('meta-row').innerHTML = chips.join('');

  if(prof.bio) $('bio').textContent = prof.bio;

  /* Stats */
  const {count} = await sb.from('posts').select('id',{count:'exact',head:true}).eq('user_id',prof.id).eq('published',true);
  $('stats').innerHTML = `
    <div class="stat"><div class="stat-n">${count||0}</div><div class="stat-l">Articoli</div></div>
    <div class="stat"><div class="stat-n">${fmtY(prof.created_at)}</div><div class="stat-l">Membro da</div></div>
  `;

  /* Action buttons */
  const actions = $('hero-actions');
  if(session?.user?.id === prof.id) {
    actions.innerHTML = `<a href="me.html" class="btn btn-primary">✏️ Modifica profilo</a>
                         <a href="me.html#write" class="btn btn-ghost">+ Scrivi articolo</a>`;
  }

  /* Load posts */
  const {data:posts} = await sb.from('posts')
    .select('id,title,excerpt,category,image_type,published_at')
    .eq('user_id',prof.id).eq('published',true)
    .order('published_at',{ascending:false});

  const grid = $('posts-grid');
  if(!posts || posts.length===0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><span>📝</span><p>Nessun articolo pubblicato ancora.</p></div>';
    return;
  }

  const normalizedPosts = posts.map(p => {
    const category = canonicalCategory(p.category) || 'Territorio';
    return {
      ...p,
      category,
      badge_color: badgeColorByCategory(category)
    };
  });

  grid.innerHTML = normalizedPosts.map(p => `
    <article class="pcard">
      <div class="pcard-img"><a class="pcard-cat pcard-cat-${p.badge_color==='green'?'green':'default'}" href="${categoryHref(p.category)}">${escapeHtml(p.category||'Territorio')}</a>${ILL[p.image_type]||ILL.nature}</div>
      <div class="pcard-body">
        <div class="pcard-meta">${fmt(p.published_at)}</div>
        <div class="pcard-title"><a href="post.html?id=${p.id}">${escapeHtml(p.title||'Articolo')}</a></div>
        ${p.excerpt ? `<div class="pcard-exc">${escapeHtml(p.excerpt)}</div>` : ''}
        <div class="pcard-foot">
          <a href="post.html?id=${p.id}" class="btn-read">Leggi →</a>
        </div>
      </div>
    </article>`).join('');
})();
</script>
</body>
</html>
