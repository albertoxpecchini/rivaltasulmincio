<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articolo – Pro Loco Rivalta sul Mincio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090f; --surface: rgba(255,255,255,.04); --border: rgba(255,255,255,.08);
      --border2: rgba(255,255,255,.13); --text: #e8eaf6; --muted: rgba(232,234,246,.48);
      --p: #1F6F8B; --a: #3a8c8a; --g: #2E7D32;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; line-height: 1.75; min-height: 100vh; }
    a { color: var(--a); text-decoration: none; }

    /* ── Aurora ───────────────────────────────────────────────────── */
    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); }
    .orb-1 { width: 700px; height: 700px; background: radial-gradient(circle,#1F6F8B 0%,transparent 60%); top:-250px; left:-200px; opacity:.09; animation: oa 22s ease-in-out infinite alternate; }
    .orb-2 { width: 450px; height: 450px; background: radial-gradient(circle,#2E7D32 0%,transparent 60%); bottom:-150px; right:-50px; opacity:.07; animation: ob 18s ease-in-out infinite alternate; }
    @keyframes oa { to { transform: translate(70px,50px) scale(1.1); } }
    @keyframes ob { to { transform: translate(-50px,-40px) scale(1.2); } }
    .grid-overlay { position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.01) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,.01) 1px, transparent 1px);
      background-size: 50px 50px; }

    /* ── Topbar ───────────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: 54px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(7,9,15,.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-brand { font-family: 'Fraunces', Georgia, serif; font-size: .92rem; font-weight: 600;
      background: linear-gradient(135deg,#EAF4F4,#3a8c8a);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 20px;
      font-size: .84rem; font-weight: 600; font-family: inherit;
      cursor: pointer; border: none; transition: all .2s; text-decoration: none;
    }
    .btn-primary { background: linear-gradient(135deg,#1F6F8B,#3a8c8a); color: #fff; box-shadow: 0 4px 16px rgba(31,111,139,.3); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 7px 22px rgba(31,111,139,.45); color: #fff; }
    .btn-ghost { background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,.1); border-color: var(--border2); }
    .btn-sm { padding: 7px 14px; font-size: .8rem; }

    /* ── Page layout ──────────────────────────────────────────────── */
    .page { position: relative; z-index: 1; }
    .container { max-width: 740px; margin: 0 auto; padding: 0 24px; }

    /* ── Article ──────────────────────────────────────────────────── */
    .post-wrap { padding: 52px 0 100px; }

    .post-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 44px; flex-wrap: wrap; gap: 10px; }

    .post-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .74rem; font-weight: 700; }
    .badge-default { background: rgba(31,111,139,.14); color: #80cbc4; border: 1px solid rgba(31,111,139,.25); }
    .badge-green  { background: rgba(46,125,50,.14); color: #a5d6a7; border: 1px solid rgba(46,125,50,.25); }

    .post-meta { display: flex; gap: 10px; align-items: center; font-size: .82rem; color: var(--muted); margin-bottom: 20px; flex-wrap: wrap; }
    .meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border2); }

    h1.post-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.7rem, 4vw, 2.6rem); font-weight: 700;
      line-height: 1.2; margin-bottom: 24px;
      background: linear-gradient(135deg, #e8eaf6 0%, rgba(232,234,246,.75) 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
    }
    .post-lead {
      font-size: 1.05rem; color: rgba(232,234,246,.7); line-height: 1.7;
      border-left: 3px solid var(--a); padding-left: 18px;
      margin-bottom: 40px;
    }

    /* Content divider */
    .content-divider { height: 1px; background: linear-gradient(90deg,transparent,var(--border2),transparent); margin-bottom: 36px; }

    /* Article body */
    .content { font-size: 1.01rem; color: rgba(232,234,246,.88); }
    .content p { margin-bottom: 1.4em; }
    .content h2 {
      font-family: 'Fraunces', Georgia, serif; font-size: 1.5rem; font-weight: 700;
      margin: 2.4em 0 .7em; color: var(--text);
    }
    .content h3 {
      font-size: 1.1rem; font-weight: 600; margin: 1.8em 0 .5em; color: var(--text);
    }
    .content strong { color: var(--text); font-weight: 600; }
    .content em { color: rgba(232,234,246,.8); font-style: italic; }
    .content ul, .content ol { padding-left: 1.5em; margin-bottom: 1.4em; }
    .content li { margin-bottom: .5em; }
    .content a { color: var(--a); border-bottom: 1px solid rgba(58,140,138,.4); transition: border-color .2s; }
    .content a:hover { border-color: var(--a); }

    /* Post footer */
    .post-footer { margin-top: 60px; padding-top: 32px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
    .author-card { display: flex; align-items: center; gap: 12px; }
    .author-av { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .author-name { font-size: .9rem; font-weight: 600; }
    .author-label { font-size: .76rem; color: var(--muted); }

    /* ── Skeleton ─────────────────────────────────────────────────── */
    .skel {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%);
      background-size: 400% 100%; animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -400% 0; } }

    /* ── Error ────────────────────────────────────────────────────── */
    .error-wrap { text-align: center; padding: 100px 20px; }
    .error-wrap h2 { font-family: 'Fraunces', Georgia, serif; font-size: 1.5rem; margin-bottom: 10px; }
    .error-wrap p { color: var(--muted); margin-bottom: 28px; }
  </style>
</head>
<body>

<div class="aurora"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="grid-overlay"></div>

<!-- Topbar -->
<div class="topbar">
  <a class="topbar-brand" href="index.html">Pro Loco Rivalta sul Mincio</a>
  <div class="topbar-right" id="nav-auth"></div>
</div>

<div class="page">
  <div class="container">
    <div class="post-wrap">

      <!-- Navigation buttons -->
      <div class="post-nav">
        <a href="index.html#news" class="btn btn-ghost btn-sm">← Torna alle notizie</a>
        <a href="index.html" class="btn btn-ghost btn-sm">🏠 Home</a>
      </div>

      <!-- Content injected here -->
      <div id="post-content">
        <!-- skeleton -->
        <div id="skeleton">
          <div class="post-badges">
            <div class="skel" style="width:70px;height:24px;border-radius:20px"></div>
          </div>
          <div class="skel" style="width:30%;height:12px;margin-bottom:14px"></div>
          <div class="skel" style="width:88%;height:40px;margin-bottom:10px;border-radius:10px"></div>
          <div class="skel" style="width:65%;height:40px;margin-bottom:32px;border-radius:10px"></div>
          <div class="skel" style="height:16px;margin-bottom:10px"></div>
          <div class="skel" style="width:94%;height:16px;margin-bottom:10px"></div>
          <div class="skel" style="width:80%;height:16px;margin-bottom:10px"></div>
          <div class="skel" style="width:88%;height:16px;margin-bottom:10px"></div>
          <div class="skel" style="width:72%;height:16px"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.config.js"></script>
<script>
(async function() {
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const id = new URLSearchParams(location.search).get('id');
  const wrap = document.getElementById('post-content');

  /* Nav auth */
  (async () => {
    const {data:{session}} = await sb.auth.getSession();
    const nav = document.getElementById('nav-auth');
    if(!nav) return;
    if(session) {
      const {data:p} = await sb.from('profiles').select('username,avatar_emoji,avatar_color').eq('id',session.user.id).single();
      if(p) nav.innerHTML = `<a href="me.html" class="btn btn-ghost btn-sm" style="gap:7px">
        <span style="width:22px;height:22px;border-radius:6px;background:${p.avatar_color};display:inline-flex;align-items:center;justify-content:center;font-size:.85rem">${p.avatar_emoji}</span>
        @${p.username}</a>`;
    } else {
      nav.innerHTML = `<a href="login.html" class="btn btn-primary btn-sm">Accedi</a>`;
    }
  })();

  if (!id || typeof SUPABASE_URL === 'undefined' || SUPABASE_URL.includes('your-project')) {
    wrap.innerHTML = `<div class="error-wrap"><h2>Articolo non trovato</h2><p>Nessun ID specificato.</p><a href="index.html#news" class="btn btn-primary">← Torna alle notizie</a></div>`;
    return;
  }

  const { data: post, error } = await sb.from('posts').select('*').eq('id', id).eq('published', true).single();

  if (error || !post) {
    wrap.innerHTML = `<div class="error-wrap"><h2>Articolo non trovato</h2><p>L'articolo non esiste o non è ancora pubblicato.</p><a href="index.html#news" class="btn btn-primary">← Torna alle notizie</a></div>`;
    return;
  }

  document.title = post.title + ' – Pro Loco Rivalta sul Mincio';
  const fmt = iso => new Date(iso).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });

  function renderContent(text) {
    if (!text) return '';
    return text
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n\n+/g, '</p><p>')
      .replace(/^/, '<p>') + '</p>';
  }

  const badgeCls = c => c === 'green' ? 'badge badge-green' : 'badge badge-default';

  wrap.innerHTML = `
    <div class="post-badges">
      <span class="${badgeCls(post.badge_color)}">${post.badge || post.category || ''}</span>
      ${post.category && post.badge && post.category !== post.badge ? `<span class="badge badge-default">${post.category}</span>` : ''}
    </div>
    <div class="post-meta">
      <time>${fmt(post.published_at)}</time>
      <span class="meta-dot"></span>
      <span>${post.category || ''}</span>
      ${post.author_username ? `<span class="meta-dot"></span><a href="profile.html?u=${post.author_username}" style="color:var(--a)">@${post.author_username}</a>` : ''}
    </div>
    <h1 class="post-title">${post.title}</h1>
    ${post.excerpt ? `<p class="post-lead">${post.excerpt}</p>` : ''}
    <div class="content-divider"></div>
    <div class="content">${renderContent(post.content)}</div>
    <div class="post-footer">
      <a href="index.html#news" class="btn btn-primary">← Tutte le notizie</a>
      ${post.author_username ? `<a href="profile.html?u=${post.author_username}" class="btn btn-ghost">Autore: @${post.author_username} →</a>` : ''}
    </div>
  `;
})();
</script>
</body>
</html>
