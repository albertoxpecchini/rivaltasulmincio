<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articolo – Pro Loco Rivalta sul Mincio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090f; --surface: rgba(255,255,255,.04); --border: rgba(255,255,255,.08);
      --border2: rgba(255,255,255,.13); --text: #e8eaf6; --muted: rgba(232,234,246,.48);
      --p: #1F6F8B; --a: #3a8c8a; --g: #2E7D32;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; line-height: 1.75; min-height: 100vh; }
    a { color: var(--a); text-decoration: none; }

    /* ── Aurora ───────────────────────────────────────────────────── */
    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); }
    .orb-1 { width: 700px; height: 700px; background: radial-gradient(circle,#1F6F8B 0%,transparent 60%); top:-250px; left:-200px; opacity:.09; animation: oa 22s ease-in-out infinite alternate; }
    .orb-2 { width: 450px; height: 450px; background: radial-gradient(circle,#2E7D32 0%,transparent 60%); bottom:-150px; right:-50px; opacity:.07; animation: ob 18s ease-in-out infinite alternate; }
    @keyframes oa { to { transform: translate(70px,50px) scale(1.1); } }
    @keyframes ob { to { transform: translate(-50px,-40px) scale(1.2); } }
    .grid-overlay { position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.01) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,.01) 1px, transparent 1px);
      background-size: 50px 50px; }

    /* ── Topbar ───────────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: 54px; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(7,9,15,.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-brand { font-family: 'Fraunces', Georgia, serif; font-size: .92rem; font-weight: 600;
      background: linear-gradient(135deg,#EAF4F4,#3a8c8a);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 20px;
      font-size: .84rem; font-weight: 600; font-family: inherit;
      cursor: pointer; border: none; transition: all .2s; text-decoration: none;
    }
    .btn-primary { background: linear-gradient(135deg,#1F6F8B,#3a8c8a); color: #fff; box-shadow: 0 4px 16px rgba(31,111,139,.3); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 7px 22px rgba(31,111,139,.45); color: #fff; }
    .btn-ghost { background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,.1); border-color: var(--border2); }
    .btn-sm { padding: 7px 14px; font-size: .8rem; }

    /* ── Page layout ──────────────────────────────────────────────── */
    .page { position: relative; z-index: 1; }
    .container { max-width: 740px; margin: 0 auto; padding: 0 24px; }

    /* ── Article ──────────────────────────────────────────────────── */
    .post-wrap { padding: 52px 0 100px; }

    .post-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 44px; flex-wrap: wrap; gap: 10px; }

    .post-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: .74rem; font-weight: 700; }
    .badge-default { background: rgba(31,111,139,.14); color: #80cbc4; border: 1px solid rgba(31,111,139,.25); }
    .badge-green  { background: rgba(46,125,50,.14); color: #a5d6a7; border: 1px solid rgba(46,125,50,.25); }

    .post-meta { display: flex; gap: 10px; align-items: center; font-size: .82rem; color: var(--muted); margin-bottom: 20px; flex-wrap: wrap; }
    .meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border2); }

    h1.post-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.7rem, 4vw, 2.6rem); font-weight: 700;
      line-height: 1.2; margin-bottom: 24px;
      background: linear-gradient(135deg, #e8eaf6 0%, rgba(232,234,246,.75) 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
    }
    .post-lead {
      font-size: 1.05rem; color: rgba(232,234,246,.7); line-height: 1.7;
      border-left: 3px solid var(--a); padding-left: 18px;
      margin-bottom: 40px;
    }

    /* Content divider */
    .content-divider { height: 1px; background: linear-gradient(90deg,transparent,var(--border2),transparent); margin-bottom: 36px; }

    /* Article body */
    .content { font-size: 1.01rem; color: rgba(232,234,246,.88); }
    .content p { margin-bottom: 1.4em; }
    .content h2 {
      font-family: 'Fraunces', Georgia, serif; font-size: 1.5rem; font-weight: 700;
      margin: 2.4em 0 .7em; color: var(--text);
    }
    .content h3 {
      font-size: 1.1rem; font-weight: 600; margin: 1.8em 0 .5em; color: var(--text);
    }
    .content strong { color: var(--text); font-weight: 600; }
    .content em { color: rgba(232,234,246,.8); font-style: italic; }
    .content ul, .content ol { padding-left: 1.5em; margin-bottom: 1.4em; }
    .content li { margin-bottom: .5em; }
    .content a { color: var(--a); border-bottom: 1px solid rgba(58,140,138,.4); transition: border-color .2s; }
    .content a:hover { border-color: var(--a); }

    /* Post footer */
    .post-footer { margin-top: 60px; padding-top: 32px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
    .author-card { display: flex; align-items: center; gap: 12px; }
    .author-av { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .author-name { font-size: .9rem; font-weight: 600; }
    .author-label { font-size: .76rem; color: var(--muted); }

    /* Discussion */
    .discussion {
      margin-top: 48px;
      border-top: 1px solid var(--border);
      padding-top: 28px;
      display: grid;
      gap: 16px;
    }
    .discussion-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .discussion-head h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.25rem;
    }
    .discussion-note {
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.5;
    }
    .discussion-msg {
      padding: 10px 12px;
      border-radius: 10px;
      font-size: .82rem;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--muted);
    }
    .discussion-msg.err {
      border-color: rgba(239,83,80,.3);
      color: #ef9a9a;
      background: rgba(239,83,80,.12);
    }
    .discussion-msg.ok {
      border-color: rgba(46,125,50,.3);
      color: #a5d6a7;
      background: rgba(46,125,50,.12);
    }
    .comment-form {
      display: grid;
      gap: 10px;
    }
    .comment-form textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 12px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: .92rem;
      line-height: 1.55;
    }
    .comment-form textarea:focus {
      outline: none;
      border-color: rgba(31,111,139,.6);
      box-shadow: 0 0 0 3px rgba(31,111,139,.12);
    }
    .comments-list {
      display: grid;
      gap: 10px;
    }
    .comment-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .comment-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      font-size: .78rem;
      color: var(--muted);
    }
    .comment-body {
      font-size: .9rem;
      color: rgba(232,234,246,.88);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .comment-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .mini-btn {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 18px;
      padding: 4px 10px;
      font-size: .73rem;
      cursor: pointer;
    }
    .mini-btn:hover {
      color: var(--text);
      border-color: var(--border2);
    }

    /* ── Skeleton ─────────────────────────────────────────────────── */
    .skel {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%);
      background-size: 400% 100%; animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -400% 0; } }

    /* ── Error ────────────────────────────────────────────────────── */
    .error-wrap { text-align: center; padding: 100px 20px; }
    .error-wrap h2 { font-family: 'Fraunces', Georgia, serif; font-size: 1.5rem; margin-bottom: 10px; }
    .error-wrap p { color: var(--muted); margin-bottom: 28px; }
  </style>
</head>
<body>

<div class="aurora"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="grid-overlay"></div>

<!-- Topbar -->
<div class="topbar">
  <a class="topbar-brand" href="index.html">Pro Loco Rivalta sul Mincio</a>
  <div class="topbar-right" id="nav-auth"></div>
</div>

<div class="page">
  <div class="container">
    <div class="post-wrap">

      <!-- Navigation buttons -->
      <div class="post-nav">
        <a href="index.html#news" class="btn btn-ghost btn-sm">← Torna alle notizie</a>
        <a href="index.html" class="btn btn-ghost btn-sm">🏠 Home</a>
      </div>

      <!-- Content injected here -->
      <div id="post-content">
        <!-- skeleton -->
        <div id="skeleton">
          <div class="post-badges">
            <div class="skel" style="width:70px;height:24px;border-radius:20px"></div>
          </div>
          <div class="skel" style="width:30%;height:12px;margin-bottom:14px"></div>
          <div class="skel" style="width:88%;height:40px;margin-bottom:10px;border-radius:10px"></div>
          <div class="skel" style="width:65%;height:40px;margin-bottom:32px;border-radius:10px"></div>
          <div class="skel" style="height:16px;margin-bottom:10px"></div>
          <div class="skel" style="width:94%;height:16px;margin-bottom:10px"></div>
          <div class="skel" style="width:80%;height:16px;margin-bottom:10px"></div>
          <div class="skel" style="width:88%;height:16px;margin-bottom:10px"></div>
          <div class="skel" style="width:72%;height:16px"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.config.js"></script>
<script src="security.client.js"></script>
<script src="categories.client.js"></script>
<script>
(async function() {
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const id = new URLSearchParams(location.search).get('id');
  const wrap = document.getElementById('post-content');
  const nav = document.getElementById('nav-auth');

  let viewerSession = null;
  let viewerProfile = null;
  let activePost = null;
  let commentsCache = [];
  let commentPrivacy = 'all';

  const COMMENT_RATE_CFG = { maxAttempts: 6, windowMs: 10 * 60 * 1000, lockMs: 30 * 60 * 1000 };
  const REPORT_RATE_CFG = { maxAttempts: 4, windowMs: 24 * 60 * 60 * 1000, lockMs: 24 * 60 * 60 * 1000 };

  function isMissingRelationError(error) {
    const msg = String(error?.message || '').toLowerCase();
    return !!error && (
      error.code === '42P01'
      || error.code === 'PGRST205'
      || msg.includes('does not exist')
      || msg.includes('could not find the table')
    );
  }

  function escapeHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  const canonicalCategory = (value) => window.RSM_CATEGORIES
    ? window.RSM_CATEGORIES.canonical(value)
    : String(value || '').trim();
  const categoryHref = (value) => window.RSM_CATEGORIES
    ? window.RSM_CATEGORIES.categoryHref(value)
    : ('category.html?name=' + encodeURIComponent(canonicalCategory(value)));
  const badgeColorByCategory = (value) => window.RSM_CATEGORIES
    ? window.RSM_CATEGORIES.badgeColor(value)
    : 'default';

  function showDiscussionMessage(message, type) {
    const box = document.getElementById('discussion-msg');
    if (!box) return;
    if (!message) {
      box.style.display = 'none';
      box.className = 'discussion-msg';
      box.textContent = '';
      return;
    }
    box.style.display = '';
    box.className = 'discussion-msg ' + (type || '');
    box.textContent = message;
  }

  async function loadViewerContext() {
    const { data: sessionData } = await sb.auth.getSession();
    viewerSession = sessionData?.session || null;

    if (!viewerSession) {
      viewerProfile = null;
      return;
    }

    const { data: profile } = await sb.from('profiles')
      .select('id,username,role,avatar_emoji,avatar_color')
      .eq('id', viewerSession.user.id)
      .single();

    viewerProfile = profile || null;
  }

  function renderNavAuth() {
    if (!nav) return;

    if (viewerSession && viewerProfile) {
      nav.innerHTML = `<a href="me.html" class="btn btn-ghost btn-sm" style="gap:7px">
        <span style="width:22px;height:22px;border-radius:6px;background:${viewerProfile.avatar_color || '#1F6F8B'};display:inline-flex;align-items:center;justify-content:center;font-size:.85rem">${viewerProfile.avatar_emoji || '🌿'}</span>
        @${viewerProfile.username}</a>`;
      return;
    }

    nav.innerHTML = `<a href="login.html" class="btn btn-primary btn-sm">Accedi</a>`;
  }

  function renderContent(text) {
    if (!text) return '';
    var safe = escapeHtml(text);
    return safe
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n\n+/g, '</p><p>')
      .replace(/^/, '<p>') + '</p>';
  }

  function canViewerComment() {
    if (commentPrivacy === 'none') {
      return { ok: false, reason: 'I commenti per questo autore sono disattivati.' };
    }
    if (!viewerSession || !viewerProfile) {
      return { ok: false, reason: 'Accedi per poter commentare.' };
    }
    if (commentPrivacy === 'members' && !['user', 'admin'].includes(viewerProfile.role || '')) {
      return { ok: false, reason: 'Solo i membri verificati possono commentare questo post.' };
    }
    return { ok: true, reason: '' };
  }

  function syncCommentComposerState() {
    const status = canViewerComment();
    const textarea = document.getElementById('comment-text');
    const submitBtn = document.getElementById('comment-submit');
    if (!textarea || !submitBtn) return;

    textarea.disabled = !status.ok;
    submitBtn.disabled = !status.ok;

    if (!status.ok) {
      textarea.placeholder = status.reason;
      showDiscussionMessage(status.reason, '');
    } else {
      textarea.placeholder = 'Scrivi un commento rispettoso e costruttivo...';
      showDiscussionMessage('', '');
    }
  }

  async function resolveCommentPrivacy() {
    if (!activePost?.user_id) {
      commentPrivacy = 'all';
      return;
    }

    const { data, error } = await sb.from('user_settings')
      .select('comment_privacy')
      .eq('user_id', activePost.user_id)
      .maybeSingle();

    if (error) {
      commentPrivacy = 'all';
      return;
    }

    commentPrivacy = data?.comment_privacy || 'all';
  }

  function renderComments() {
    const list = document.getElementById('comments-list');
    if (!list) return;

    if (!commentsCache.length) {
      list.innerHTML = '<p class="discussion-note">Nessun commento ancora. Inizia tu la discussione.</p>';
      return;
    }

    const nowTs = Date.now();
    list.innerHTML = commentsCache.map((comment) => {
      const author = comment.author_username ? '@' + escapeHtml(comment.author_username) : 'Utente';
      const ownComment = !!viewerSession && comment.user_id === viewerSession.user.id;
      const createdAt = new Date(comment.created_at).getTime();
      const canEdit = ownComment && (nowTs - createdAt) <= (10 * 60 * 1000);

      return `
        <article class="comment-card">
          <div class="comment-meta">
            <span>${author}</span>
            <time>${new Date(comment.created_at).toLocaleString('it-IT')}</time>
          </div>
          <div class="comment-body">${escapeHtml(comment.content)}</div>
          <div class="comment-actions">
            ${canEdit ? `<button class="mini-btn" type="button" onclick="editComment('${comment.id}')">Modifica</button>` : ''}
            ${ownComment ? `<button class="mini-btn" type="button" onclick="deleteComment('${comment.id}')">Elimina</button>` : ''}
          </div>
        </article>`;
    }).join('');
  }

  async function loadComments() {
    const list = document.getElementById('comments-list');
    if (!list || !activePost?.id) return;

    const { data, error } = await sb.from('comments')
      .select('id,post_id,user_id,author_username,content,created_at,is_hidden')
      .eq('post_id', activePost.id)
      .eq('is_hidden', false)
      .order('created_at', { ascending: true });

    if (error) {
      if (isMissingRelationError(error)) {
        list.innerHTML = '<p class="discussion-note">Commenti non disponibili: applica supabase-security.sql su Supabase.</p>';
        return;
      }
      list.innerHTML = `<p class="discussion-note">Errore caricamento commenti: ${escapeHtml(error.message)}</p>`;
      return;
    }

    commentsCache = data || [];
    renderComments();
  }

  async function submitComment(event) {
    event.preventDefault();
    const textarea = document.getElementById('comment-text');
    if (!textarea || !viewerSession || !viewerProfile || !activePost?.id) {
      showDiscussionMessage('Accedi per poter commentare.', 'err');
      return;
    }

    const access = canViewerComment();
    if (!access.ok) {
      showDiscussionMessage(access.reason, 'err');
      return;
    }

    const content = textarea.value.trim();
    if (!content) {
      showDiscussionMessage('Il commento non puo essere vuoto.', 'err');
      return;
    }

    if (window.RSM_SECURITY) {
      const commentLimit = window.RSM_SECURITY.checkRateLimit('comment_write', viewerSession.user.id, COMMENT_RATE_CFG);
      if (!commentLimit.ok) {
        showDiscussionMessage('Stai commentando troppo velocemente. Riprova tra ' + window.RSM_SECURITY.formatRetry(commentLimit.retryAfterMs) + '.', 'err');
        return;
      }

      const safety = window.RSM_SECURITY.evaluateTextSafety(content, {
        minChars: 3,
        maxChars: 1200,
        maxLinks: 2,
        maxRepeatedChar: 6,
        maxRepeatedLine: 3,
      });
      if (!safety.ok) {
        window.RSM_SECURITY.recordRateFailure('comment_write', viewerSession.user.id, COMMENT_RATE_CFG);
        showDiscussionMessage(safety.message, 'err');
        return;
      }
    }

    const payload = {
      post_id: activePost.id,
      user_id: viewerSession.user.id,
      author_username: viewerProfile.username || null,
      content: content,
      is_hidden: false,
    };
    const { error } = await sb.from('comments').insert(payload);

    if (error) {
      if (window.RSM_SECURITY) {
        window.RSM_SECURITY.recordRateFailure('comment_write', viewerSession.user.id, COMMENT_RATE_CFG);
      }
      if (isMissingRelationError(error)) {
        showDiscussionMessage('Commenti non attivi nel database. Esegui supabase-security.sql.', 'err');
        return;
      }
      showDiscussionMessage('Commento non salvato: ' + error.message, 'err');
      return;
    }

    if (window.RSM_SECURITY) {
      window.RSM_SECURITY.clearRateFailures('comment_write', viewerSession.user.id);
    }

    textarea.value = '';
    showDiscussionMessage('Commento pubblicato.', 'ok');
    await loadComments();
  }

  async function editComment(commentId) {
    if (!viewerSession) return;
    const comment = commentsCache.find((item) => item.id === commentId);
    if (!comment || comment.user_id !== viewerSession.user.id) return;

    const ageMs = Date.now() - new Date(comment.created_at).getTime();
    if (ageMs > 10 * 60 * 1000) {
      showDiscussionMessage('Puoi modificare un commento solo entro 10 minuti.', 'err');
      return;
    }

    const next = prompt('Modifica commento:', comment.content || '');
    if (next === null) return;
    const content = String(next).trim();
    if (!content) {
      showDiscussionMessage('Il commento non puo essere vuoto.', 'err');
      return;
    }

    if (window.RSM_SECURITY) {
      const safety = window.RSM_SECURITY.evaluateTextSafety(content, {
        minChars: 3,
        maxChars: 1200,
        maxLinks: 2,
        maxRepeatedChar: 6,
        maxRepeatedLine: 3,
      });
      if (!safety.ok) {
        showDiscussionMessage(safety.message, 'err');
        return;
      }
    }

    const { error } = await sb.from('comments').update({ content: content }).eq('id', commentId);
    if (error) {
      showDiscussionMessage('Modifica non riuscita: ' + error.message, 'err');
      return;
    }

    showDiscussionMessage('Commento aggiornato.', 'ok');
    await loadComments();
  }

  async function deleteComment(commentId) {
    if (!viewerSession) return;
    const comment = commentsCache.find((item) => item.id === commentId);
    if (!comment || comment.user_id !== viewerSession.user.id) return;
    if (!confirm('Eliminare questo commento?')) return;

    const { error } = await sb.from('comments').delete().eq('id', commentId);
    if (error) {
      showDiscussionMessage('Eliminazione non riuscita: ' + error.message, 'err');
      return;
    }

    showDiscussionMessage('Commento eliminato.', 'ok');
    await loadComments();
  }

  async function reportPost() {
    if (!viewerSession || !activePost?.id) {
      showDiscussionMessage('Accedi per inviare una segnalazione.', 'err');
      return;
    }

    if (window.RSM_SECURITY) {
      const reportLimit = window.RSM_SECURITY.checkRateLimit('report_write', viewerSession.user.id, REPORT_RATE_CFG);
      if (!reportLimit.ok) {
        showDiscussionMessage('Hai inviato troppe segnalazioni. Riprova tra ' + window.RSM_SECURITY.formatRetry(reportLimit.retryAfterMs) + '.', 'err');
        return;
      }
    }

    const reason = prompt('Motivo segnalazione (es: spam, offese, disinformazione):', 'spam');
    if (reason === null) return;
    const reasonText = String(reason || '').trim();
    if (!reasonText) {
      showDiscussionMessage('Inserisci un motivo valido per la segnalazione.', 'err');
      return;
    }

    const details = prompt('Dettagli (opzionale):', '') || '';
    const detailsText = String(details).trim();

    if (reasonText.length < 3) {
      showDiscussionMessage('Motivo troppo breve.', 'err');
      return;
    }
    if (reasonText.length > 120) {
      showDiscussionMessage('Motivo troppo lungo.', 'err');
      return;
    }
    if (detailsText.length > 1000) {
      showDiscussionMessage('Dettagli troppo lunghi.', 'err');
      return;
    }

    const reportLinks = (reasonText + '\n' + detailsText).match(/https?:\/\/|www\./gi);
    if (reportLinks && reportLinks.length > 1) {
      showDiscussionMessage('Segnalazione bloccata: troppi link.', 'err');
      return;
    }

    const payload = {
      post_id: activePost.id,
      reporter_id: viewerSession.user.id,
      reason: reasonText,
      details: detailsText || null,
      status: 'pending',
    };

    const { error } = await sb.from('reports').insert(payload);
    if (error) {
      if (window.RSM_SECURITY) {
        window.RSM_SECURITY.recordRateFailure('report_write', viewerSession.user.id, REPORT_RATE_CFG);
      }

      const errMsg = String(error.message || '').toLowerCase();
      if (errMsg.includes('duplicate key')) {
        showDiscussionMessage('Hai gia segnalato questo contenuto.', 'err');
        return;
      }
      if (isMissingRelationError(error)) {
        showDiscussionMessage('Segnalazioni non attive nel database. Esegui supabase-security.sql.', 'err');
        return;
      }
      showDiscussionMessage('Segnalazione non inviata: ' + error.message, 'err');
      return;
    }

    if (window.RSM_SECURITY) {
      window.RSM_SECURITY.clearRateFailures('report_write', viewerSession.user.id);
    }
    showDiscussionMessage('Segnalazione inviata alla moderazione. Grazie.', 'ok');
  }

  function bindDiscussionHandlers() {
    const form = document.getElementById('comment-form');
    if (form) form.addEventListener('submit', submitComment);

    const reportBtn = document.getElementById('report-post-btn');
    if (reportBtn) reportBtn.addEventListener('click', reportPost);
  }

  await loadViewerContext();
  renderNavAuth();

  if (!id || typeof SUPABASE_URL === 'undefined' || SUPABASE_URL.includes('your-project')) {
    wrap.innerHTML = `<div class="error-wrap"><h2>Articolo non trovato</h2><p>Nessun ID specificato.</p><a href="index.html#news" class="btn btn-primary">← Torna alle notizie</a></div>`;
    return;
  }

  const { data: post, error } = await sb.from('posts').select('*').eq('id', id).eq('published', true).single();

  if (error || !post) {
    wrap.innerHTML = `<div class="error-wrap"><h2>Articolo non trovato</h2><p>L'articolo non esiste o non è ancora pubblicato.</p><a href="index.html#news" class="btn btn-primary">← Torna alle notizie</a></div>`;
    return;
  }

  document.title = post.title + ' – Pro Loco Rivalta sul Mincio';
  const fmt = iso => new Date(iso).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });

  const badgeCls = c => c === 'green' ? 'badge badge-green' : 'badge badge-default';

  activePost = {
    ...post,
    category: canonicalCategory(post.category) || 'Territorio',
    badge_color: post.badge_color || badgeColorByCategory(post.category)
  };
  const safeTitle = escapeHtml(activePost.title || 'Articolo');
  const safeExcerpt = escapeHtml(activePost.excerpt || '');
  const safeCategory = escapeHtml(activePost.category || '');
  const safeBadge = escapeHtml(activePost.badge || activePost.category || '');
  const safeAuthor = escapeHtml(activePost.author_username || '');
  const safeCategoryHref = categoryHref(activePost.category);
  const authorHref = activePost.author_username ? `profile.html?u=${encodeURIComponent(activePost.author_username)}` : '';

  wrap.innerHTML = `
    <div class="post-badges">
      <span class="${badgeCls(activePost.badge_color)}">${safeBadge}</span>
      ${activePost.category && activePost.badge && activePost.category !== activePost.badge ? `<a class="badge badge-default" href="${safeCategoryHref}">${safeCategory}</a>` : ''}
    </div>
    <div class="post-meta">
      <time>${fmt(activePost.published_at)}</time>
      <span class="meta-dot"></span>
      <a href="${safeCategoryHref}" style="color:var(--a)">${safeCategory}</a>
      ${activePost.author_username ? `<span class="meta-dot"></span><a href="${authorHref}" style="color:var(--a)">@${safeAuthor}</a>` : ''}
    </div>
    <h1 class="post-title">${safeTitle}</h1>
    ${activePost.excerpt ? `<p class="post-lead">${safeExcerpt}</p>` : ''}
    <div class="content-divider"></div>
    <div class="content">${renderContent(activePost.content)}</div>
    <div class="post-footer">
      <a href="index.html#news" class="btn btn-primary">← Tutte le notizie</a>
      ${activePost.author_username ? `<a href="${authorHref}" class="btn btn-ghost">Autore: @${safeAuthor} →</a>` : ''}
    </div>
    <section class="discussion" id="discussion">
      <div class="discussion-head">
        <h2>Discussione</h2>
      </div>
      <p class="discussion-note">Commenti con filtro anti-spam e moderazione. Modifica consentita entro 10 minuti.</p>
      <div id="discussion-msg" class="discussion-msg" style="display:none"></div>
      <form class="comment-form" id="comment-form">
        <textarea id="comment-text" placeholder="Scrivi un commento rispettoso e costruttivo..."></textarea>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" id="comment-submit" type="submit">Pubblica commento</button>
          <button class="btn btn-ghost btn-sm" id="report-post-btn" type="button">Segnala post</button>
        </div>
      </form>
      <div id="comments-list" class="comments-list">
        <p class="discussion-note">Caricamento commenti...</p>
      </div>
    </section>
  `;

  await resolveCommentPrivacy();
  bindDiscussionHandlers();
  syncCommentComposerState();
  await loadComments();

  window.editComment = editComment;
  window.deleteComment = deleteComment;
})();
</script>
</body>
</html>
