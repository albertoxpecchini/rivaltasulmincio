<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F6F8B"/>
      <stop offset="60%" stop-color="#2d8b89"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <radialGradient id="lg-glow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#fff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background tile -->
  <rect width="512" height="512" rx="112" fill="url(#lg)"/>
  <rect width="512" height="512" rx="112" fill="url(#lg-glow)"/>

  <!-- water waves -->
  <path d="M70 300 C 140 250 372 250 442 300" stroke="#EAF4F4" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M70 370 C 140 330 372 330 442 370" stroke="#EAF4F4" stroke-width="16" fill="none" stroke-linecap="round" opacity=".75"/>
  <path d="M90 430 C 160 405 352 405 422 430" stroke="#EAF4F4" stroke-width="11" fill="none" stroke-linecap="round" opacity=".5"/>

  <!-- fish silhouette (luccio) above water -->
  <g transform="translate(256 200)">
    <path d="M-110 0 C -90 -40 70 -50 130 -25 L 165 -10 L 165 10 L 130 25 C 70 50 -90 40 -110 0 Z" fill="#EAF4F4"/>
    <path d="M-110 0 L -160 -45 L -135 -15 L -160 0 L -135 15 L -160 45 Z" fill="#EAF4F4"/>
    <circle cx="135" cy="-2" r="6" fill="#0F2A30"/>
    <circle cx="137" cy="-4" r="2" fill="#fff"/>
    <path d="M150 8 Q 160 14 168 10" stroke="#0F2A30" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- subtle scale lines -->
    <g stroke="#1F6F8B" stroke-width="1.6" fill="none" opacity=".55">
      <path d="M-80 -18 Q -70 -8 -80 2"/>
      <path d="M-50 -22 Q -40 -10 -50 0"/>
      <path d="M-20 -25 Q -10 -12 -20 -2"/>
      <path d="M10 -25 Q 20 -12 10 -1"/>
      <path d="M40 -22 Q 50 -10 40 0"/>
      <path d="M70 -18 Q 80 -8 70 2"/>
    </g>
  </g>

  <!-- bird overhead -->
  <g transform="translate(256 110)" stroke="#EAF4F4" stroke-width="6" fill="none" stroke-linecap="round" opacity=".9">
    <path d="M-30 0 q 12 -14 24 0 q 12 -14 24 0"/>
  </g>
</svg>
