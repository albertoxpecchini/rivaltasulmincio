<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categoria - Rivalta sul Mincio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #eef6f4;
      --surface: #ffffff;
      --border: #c8deda;
      --text: #0d2830;
      --muted: #537575;
      --p: #1F6F8B;
      --a: #3a8c8a;
      --g: #2E7D32;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 10%, rgba(31,111,139,.07), transparent 42%), radial-gradient(circle at 90% 90%, rgba(46,125,50,.06), transparent 38%), var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.6;
    }
    a { color: var(--a); text-decoration: none; }

    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); }
    .orb-1 { width: 620px; height: 620px; background: radial-gradient(circle,#1F6F8B 0%,transparent 60%); top:-220px; left:-150px; opacity:.06; }
    .orb-2 { width: 460px; height: 460px; background: radial-gradient(circle,#2E7D32 0%,transparent 60%); bottom:-180px; right:-120px; opacity:.05; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 56px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(7,9,15,.88);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
    }
    .topbar-brand {
      font-family: 'Fraunces', Georgia, serif;
      font-size: .95rem;
      font-weight: 600;
      background: linear-gradient(135deg,#EAF4F4,#3a8c8a);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.04);
      color: var(--muted);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: .79rem;
      font-weight: 600;
    }
    .btn:hover { color: var(--text); border-color: #a8c8c4; background: rgba(0,0,0,.07); }

    .page {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 34px 20px 80px;
    }
    .head h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      margin-bottom: 8px;
    }
    .head p { color: var(--muted); font-size: .9rem; }

    .category-row {
      margin-top: 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      border: 1px solid var(--border);
      background: rgba(0,0,0,.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: .76rem;
      font-weight: 700;
      letter-spacing: .03em;
      transition: all .2s;
    }
    .chip:hover { color: var(--text); border-color: #a8c8c4; background: rgba(0,0,0,.07); }
    .chip.on {
      color: #fff;
      background: linear-gradient(135deg,#1F6F8B,#3a8c8a);
      border-color: transparent;
      box-shadow: 0 8px 22px rgba(31,111,139,.35);
    }

    .posts {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }
    .post-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      padding: 14px;
      display: grid;
      gap: 8px;
    }
    .post-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .78rem;
    }
    .post-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.15rem;
      line-height: 1.3;
    }
    .post-title a { color: var(--text); }
    .post-title a:hover { color: var(--a); }
    .post-excerpt { color: var(--muted); font-size: .9rem; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 700;
      color: #fff;
      background: var(--p);
    }
    .badge.green { background: var(--g); }

    .empty {
      margin-top: 24px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
      font-size: .88rem;
    }
  </style>
</head>
<body>
<div class="aurora"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<div class="topbar">
  <a class="topbar-brand" href="index.html">Pro Loco Rivalta sul Mincio</a>
  <div class="topbar-actions">
    <a class="btn" href="index.html#news">Bacheca</a>
    <a class="btn" href="me.html">Account</a>
  </div>
</div>

<main class="page">
  <header class="head">
    <h1 id="cat-title">Categoria</h1>
    <p id="cat-sub">Pagina dedicata con i post pubblicati per questa categoria.</p>
  </header>

  <nav class="category-row" id="category-row"></nav>
  <section class="posts" id="posts"></section>
  <div class="empty" id="empty" style="display:none"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.config.js"></script>
<script src="categories.client.js"></script>
<script>
(function () {
  if (typeof SUPABASE_URL === 'undefined' || SUPABASE_URL.includes('your-project')) return;

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const row = document.getElementById('category-row');
  const postsEl = document.getElementById('posts');
  const emptyEl = document.getElementById('empty');
  const titleEl = document.getElementById('cat-title');
  const subEl = document.getElementById('cat-sub');

  const categories = window.RSM_CATEGORIES
    ? window.RSM_CATEGORIES.all()
    : ['Eventi', 'Territorio', 'Vita locale', 'Avvisi', 'Richieste', 'Storie'];
  const canonical = (value) => window.RSM_CATEGORIES
    ? window.RSM_CATEGORIES.canonical(value)
    : String(value || '').trim();
  const badgeColor = (value) => window.RSM_CATEGORIES
    ? window.RSM_CATEGORIES.badgeColor(value)
    : 'default';

  const params = new URLSearchParams(window.location.search);
  const requested = canonical(params.get('name') || '');
  const activeCategory = categories.includes(requested) ? requested : categories[0];

  document.title = activeCategory + ' - Rivalta sul Mincio';
  titleEl.textContent = activeCategory;
  subEl.textContent = 'Articoli pubblicati nella categoria ' + activeCategory + '.';

  row.innerHTML = categories.map(function (cat) {
    const cls = cat === activeCategory ? 'chip on' : 'chip';
    return '<a class="' + cls + '" href="category.html?name=' + encodeURIComponent(cat) + '">' + cat + '</a>';
  }).join('');

  const fmt = function (iso) {
    return new Date(iso).toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: 'numeric' });
  };

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  sb.from('posts')
    .select('id,title,excerpt,category,badge,badge_color,published_at')
    .eq('published', true)
    .order('published_at', { ascending: false })
    .limit(120)
    .then(function (res) {
      if (res.error) {
        emptyEl.style.display = '';
        emptyEl.textContent = 'Errore caricamento post: ' + res.error.message;
        return;
      }

      const rows = (res.data || []).map(function (post) {
        return {
          ...post,
          category: canonical(post.category) || 'Territorio',
          badge_color: post.badge_color || badgeColor(post.category)
        };
      }).filter(function (post) {
        return post.category === activeCategory;
      });

      if (!rows.length) {
        emptyEl.style.display = '';
        emptyEl.textContent = 'Nessun articolo disponibile in questa categoria.';
        return;
      }

      postsEl.innerHTML = rows.map(function (post) {
        const badgeClass = post.badge_color === 'green' ? 'badge green' : 'badge';
        return '<article class="post-card">' +
          '<div class="post-meta">' +
            '<time>' + fmt(post.published_at) + '</time>' +
            '<span class="' + badgeClass + '">' + escapeHtml(post.badge || post.category || '') + '</span>' +
          '</div>' +
          '<h2 class="post-title"><a href="post.html?id=' + post.id + '">' + escapeHtml(post.title || 'Articolo') + '</a></h2>' +
          '<p class="post-excerpt">' + escapeHtml(post.excerpt || '') + '</p>' +
        '</article>';
      }).join('');
    });
})();
</script>
</body>
</html>
